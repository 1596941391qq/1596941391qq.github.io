<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>NanoBanana2 AI 文章数据</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    :root {
      --bg: 248 250 252;
      --fg: 15 23 42;
      --card: 255 255 255;
      --card-fg: 30 41 59;
      --primary: 244 114 182;
      --primary-fg: 255 255 255;
      --secondary: 241 245 249;
      --secondary-fg: 51 65 85;
      --muted: 241 245 249;
      --muted-fg: 100 116 139;
      --border: 226 232 240;
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgb(var(--bg));
      font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      color: rgb(var(--fg));
      min-height: 100vh;
      padding: 32px;
      line-height: 1.5;
    }
    .container { max-width: 1600px; margin: 0 auto; }

    .header { margin-bottom: 32px; }
    .page-title { font-size: 1.75rem; font-weight: 700; color: rgb(var(--fg)); letter-spacing: -0.025em; }
    .subtitle { color: rgb(var(--muted-fg)); font-size: 0.95rem; margin-top: 4px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .stat-label { color: rgb(var(--muted-fg)); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.625rem; font-weight: 700; color: rgb(var(--card-fg)); margin-top: 4px; letter-spacing: -0.03em; }
    .stat-value.highlight { color: rgb(var(--primary)); }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .chart-card.half { grid-column: span 1; }
    .chart-card.full { grid-column: span 2; }

    .chart-header { margin-bottom: 16px; }
    .chart-title { font-size: 0.95rem; font-weight: 600; color: rgb(var(--card-fg)); }
    .chart-desc { font-size: 0.8rem; color: rgb(var(--muted-fg)); margin-top: 2px; }
    .chart-container { width: 100%; height: 320px; }

    .data-table {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid rgb(var(--border));
    }
    .table-title { font-size: 1rem; font-weight: 600; }
    .table-pagination { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: rgb(var(--muted-fg)); }
    .page-btn {
      padding: 6px 14px;
      border: 1px solid rgb(var(--border));
      background: rgb(var(--card));
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: rgb(var(--primary)); color: rgb(var(--primary)); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 20px; text-align: left; font-size: 0.85rem; }
    th {
      background: rgb(var(--secondary));
      color: rgb(var(--secondary-fg));
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    td { color: rgb(var(--card-fg)); border-bottom: 1px solid rgb(var(--border)); }
    tr:hover { background: rgb(var(--muted)); }
    .rank-num { font-weight: 600; color: rgb(var(--muted-fg)); width: 50px; }
    .keyword-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .keyword-link { color: rgb(var(--primary)); text-decoration: none; font-weight: 500; }
    .keyword-link:hover { text-decoration: underline; }
    .views-cell { font-weight: 600; color: rgb(var(--primary)); }
    .days-cell { color: rgb(var(--muted-fg)); }

    @media (max-width: 1024px) {
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card.full { grid-column: span 1; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="page-title">{{BRAND}} 文章数据洞察</div>
      <p class="subtitle">发布天数 vs 阅读量增长分析</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">在跑文章</div>
        <div class="stat-value" id="totalArticles">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">总阅读量</div>
        <div class="stat-value" id="totalViews">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均发布天数</div>
        <div class="stat-value" id="avgDays">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">日均阅读</div>
        <div class="stat-value" id="avgViewsPerDay">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top 1 阅读</div>
        <div class="stat-value highlight" id="topViews">-</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card half">
        <div class="chart-header">
          <div class="chart-title">Rankings</div>
          <div class="chart-desc">阅读量排名 TOP 10</div>
        </div>
        <div class="chart-container" id="barChart"></div>
      </div>
      <div class="chart-card half">
        <div class="chart-header">
          <div class="chart-title">Distribution</div>
          <div class="chart-desc">占比分析 TOP 8</div>
        </div>
        <div class="chart-container" id="pieChart"></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card half">
        <div class="chart-header">
          <div class="chart-title">Scatter Analysis</div>
          <div class="chart-desc">X=天数 Y=阅读量 点大小=日均</div>
        </div>
        <div class="chart-container" id="scatterChart"></div>
      </div>
      <div class="chart-card half">
        <div class="chart-header">
          <div class="chart-title">Batch Comparison</div>
          <div class="chart-desc">批次(周) x D3/D7/D14/D30</div>
        </div>
        <div class="chart-container" id="heatmapChart"></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-header">
          <div class="chart-title">Growth Trend</div>
          <div class="chart-desc">发布天数 vs 阅读量增长曲线</div>
        </div>
        <div class="chart-container" id="lineChart"></div>
      </div>
    </div>

    <div class="data-table">
      <div class="table-header">
        <div class="table-title">Keyword Details</div>
        <div class="table-pagination">
          <span id="pageInfo">1 - 10 / 0</span>
          <button class="page-btn" id="prevBtn">Prev</button>
          <button class="page-btn" id="nextBtn">Next</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Keyword</th>
            <th>Published</th>
            <th>Days</th>
            <th>Views</th>
            <th>Views/Day</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ============ 数据注入点 - 替换 rawData ============
    // 格式: { keyword, created_at, views, url }
    // created_at: ISO 日期字符串
    // url: UniFuncs 分享链接
    const rawData = [
  { keyword: "nanobanana2 free",          created_at: "2026-03-22T05:24:09", views: 93,  url: "https://unifuncs.com/s/QRNgsGXn" },
  { keyword: "nanobanana2 fast",           created_at: "2026-03-22T05:23:38", views: 86,  url: "https://unifuncs.com/s/KyBVYeyR" },
  { keyword: "nanobanana2 template",       created_at: "2026-03-22T05:28:30", views: 76,  url: "https://unifuncs.com/s/zuZuWGYO" },
  { keyword: "gemini3.1flash image 8k", created_at: "2026-03-22T05:22:24", views: 56,  url: "https://unifuncs.com/s/TPxGXOrx" },
  { keyword: "nanobanana2 batch",          created_at: "2026-03-22T05:23:13", views: 52,  url: "https://unifuncs.com/s/7ti0PJPa" },
  { keyword: "nanobanana2 review",        created_at: "2026-03-22T05:28:07", views: 51,  url: "https://unifuncs.com/s/FK0UVv5D" },
  { keyword: "nanobanana2 official",      created_at: "2026-03-22T05:27:17", views: 45,  url: "https://unifuncs.com/s/4RdFrWnR" },
  { keyword: "nanobanana2 api",           created_at: "2026-03-22T05:22:47", views: 20,  url: "https://unifuncs.com/s/JfPws1yU" },
  { keyword: "nanobanana2 portrait",      created_at: "2026-03-22T05:27:41", views: 9,   url: "https://unifuncs.com/s/H2eVfJ7o" },
  { keyword: "nanobanana2 tutorial",      created_at: "2026-03-22T05:29:01", views: 0,   url: "" }
];

    // ============ 模板逻辑（无需修改）============
    
    const today = new Date();
    const processedData = rawData.map(d => {
      const createdStr = d.created_at && d.created_at.trim() ? d.created_at : '2026-03-22T00:00:00';
      const created = new Date(createdStr);
      if (isNaN(created.getTime())) return null;
      const days = Math.max(1, Math.floor((today - created) / (1000 * 60 * 60 * 24)));
      return { ...d, days, viewsPerDay: days > 0 ? (d.views / days).toFixed(1) : '0', date: created.toISOString().slice(0, 10) };
    }).filter(d => d !== null).sort((a, b) => b.views - a.views);
    const totalViews = processedData.reduce((sum, d) => sum + d.views, 0);
    const totalDays = processedData.reduce((sum, d) => sum + d.days, 0);
    const avgDays = Math.round(totalDays / processedData.length) || 0;
    const avgVPD = totalDays ? (totalViews / totalDays).toFixed(1) : 0;
    const maxViews = Math.max(...processedData.map(d => d.views), 0);
    const maxDays = Math.max(...processedData.map(d => d.days), 1);
    document.getElementById('totalArticles').textContent = processedData.filter(d => d.views > 0).length;
    document.getElementById('totalViews').textContent = totalViews;
    document.getElementById('avgDays').textContent = avgDays + 'd';
    document.getElementById('avgViewsPerDay').textContent = avgVPD;
    document.getElementById('topViews').textContent = maxViews;
    const colors = ['#a855f7','#9333ea','#7c3aed','#6d28d9','#5b21b6','#4c1d95','#3b0d7a','#7e22ce','#c026d3','#d946ef'];
    let charts = {};
    function renderBarChart() { const chart = echarts.init(document.getElementById('barChart')); const top10 = processedData.slice(0,10); chart.setOption({ tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } }, grid: { left: '3%', right: '15%', bottom: '3%', top: '3%', containLabel: true }, xAxis: { type: 'value', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } }, yAxis: { type: 'category', data: top10.map(d => d.keyword.length > 16 ? d.keyword.slice(0,14)+'..' : d.keyword).reverse(), axisLabel: { color: '#475569', fontSize: 11 } }, series: [{ type: 'bar', data: top10.map((d,i) => ({ value: d.views, itemStyle: { color: colors[i%colors.length], borderRadius: [0,4,4,0] } })).reverse(), label: { show: true, position: 'right', color: '#64748b', fontSize: 11 }, animationDuration: 600 }] }); charts.bar = chart; }
    function renderPieChart() { const chart = echarts.init(document.getElementById('pieChart')); const nonzero = processedData.filter(d => d.views > 0); chart.setOption({ tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } }, legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#64748b', fontSize: 10 }, itemWidth: 10, itemHeight: 10 }, series: [{ type: 'pie', radius: ['45%','70%'], center: ['35%','50%'], avoidLabelOverlap: false, itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 }, label: { show: false }, emphasis: { label: { show: true, fontSize: 11, fontWeight: 'bold' } }, data: nonzero.map((d,i) => ({ name: d.keyword.length > 12 ? d.keyword.slice(0,10)+'..' : d.keyword, value: d.views, itemStyle: { color: colors[i%colors.length] } })), animationType: 'scale', animationDuration: 600 }] }); charts.pie = chart; }
    function renderScatterChart() { const chart = echarts.init(document.getElementById('scatterChart')); chart.setOption({ tooltip: { trigger: 'item', formatter: function(params) { const d = processedData[params.dataIndex]; return '<strong>'+d.keyword+'</strong><br/>Days: '+d.days+'<br/>Views: '+d.views+'<br/>Views/Day: '+d.viewsPerDay; }, backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } }, grid: { left: '15%', right: '8%', bottom: '12%', top: '8%', containLabel: true }, xAxis: { type: 'value', name: 'Days', nameLocation: 'middle', nameGap: 25, nameTextStyle: { color: '#64748b', fontSize: 11 }, min: 0, max: maxDays+1, splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } }, yAxis: { type: 'value', name: 'Views', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } }, series: [{ type: 'scatter', symbolSize: function(data) { return Math.max(10, Math.min(35, Math.sqrt(data[2]+1)*4)); }, data: processedData.map(d => ({ value: [d.days, d.views, parseFloat(d.viewsPerDay)], itemStyle: { color: colors[processedData.indexOf(d)%colors.length] } })), emphasis: { itemStyle: { borderColor: '#a855f7', borderWidth: 2, shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.2)' } } }], animationDuration: 800 }); charts.scatter = chart; }
    function renderSecondBarChart() { const chart = echarts.init(document.getElementById('barChart2')); const nonzero = processedData.filter(d => d.views > 0); chart.setOption({ tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } }, grid: { left: '3%', right: '4%', bottom: '10%', top: '10%', containLabel: true }, xAxis: { type: 'category', data: nonzero.map(d => d.keyword.length > 14 ? d.keyword.slice(0,12)+'..' : d.keyword), axisLabel: { color: '#64748b', rotate: 20, fontSize: 10 }, axisLine: { lineStyle: { color: '#e2e8f0' } } }, yAxis: { type: 'value', name: 'Views', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } }, series: [{ type: 'bar', data: nonzero.map((d,i) => ({ value: d.views, itemStyle: { color: colors[i%colors.length], borderRadius: [4,4,0,0] } })), label: { show: true, position: 'top', color: '#64748b', fontSize: 10 }, animationDuration: 600 }], animationDuration: 800 }); charts.bar2 = chart; }
    let currentPage = 1;
    const pageSize = 10;
    function renderTable() { const tbody = document.getElementById('tableBody'); const start = (currentPage-1)*pageSize; const pageData = processedData.slice(start, start+pageSize); document.getElementById('pageInfo').textContent = (start+1)+' - '+Math.min(start+pageSize,processedData.length)+' / '+processedData.length; document.getElementById('prevBtn').disabled = currentPage===1; document.getElementById('nextBtn').disabled = start+pageSize >= processedData.length; tbody.innerHTML = pageData.map((d,i) => '<tr><td class="rank-num">'+(start+i+1)+'</td><td class="keyword-cell">'+(d.url ? '<a class="keyword-link" href="'+d.url+'" target="_blank" title="'+d.keyword+'">'+d.keyword+'</a>' : d.keyword)+'</td><td>'+d.date+'</td><td class="days-cell">'+d.days+'d</td><td class="views-cell">'+d.views+'</td><td>'+d.viewsPerDay+'</td></tr>').join(''); }
    document.getElementById('prevBtn').addEventListener('click', () => { if(currentPage>1){currentPage--;renderTable();} });
    document.getElementById('nextBtn').addEventListener('click', () => { currentPage++; renderTable(); });
    window.addEventListener('resize', () => { Object.values(charts).forEach(c => c && c.resize()); });
    renderBarChart(); renderPieChart(); renderScatterChart(); renderSecondBarChart(); renderTable();
</body>
</html>
