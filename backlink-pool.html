<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外链资源池 | Backlink Pool</title>
<style>
:root{--bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--border:rgba(255,255,255,0.06);--text:#e4e4e7;--text2:#a1a1aa;--text3:#71717a;--green:#22c55e;--blue:#3b82f6;--orange:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1800px;margin:0 auto;padding:16px 20px}

/* Header */
.hdr{text-align:center;padding:20px 0 16px}
.hdr h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em}
.hdr .sub{color:var(--text3);font-size:0.75rem;margin-top:4px}

/* Tier Legend */
.tier-legend{display:flex;justify-content:center;gap:20px;margin:10px 0;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:0.72rem;flex-wrap:wrap}
.tier-legend .tl-item{display:flex;align-items:center;gap:6px;color:var(--text2)}
.tier-legend .tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tier-legend .tl-dot.t1{background:var(--green)}
.tier-legend .tl-dot.t2{background:var(--blue)}
.tier-legend .tl-dot.t3{background:var(--text3)}
.tier-legend .tl-desc{color:var(--text3);font-size:0.65rem}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin:12px 0 16px}
.st{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
.st-v{font-size:1.2rem;font-weight:700;color:var(--green)}
.st-l{font-size:0.65rem;color:var(--text3);margin-top:2px}

/* Filters */
.flt{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.fg select,.fg input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:0.75rem;min-width:110px;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--blue)}
.fg input{min-width:160px}
.sort-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:0.7rem;color:var(--text3)}
.sort-bar span{white-space:nowrap}
.sort-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.7rem}
.sort-btn:hover{border-color:var(--blue);color:var(--text)}
.sort-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.result-count{margin-left:auto;color:var(--text2)}

/* Grid container */
.grid-wrap{position:relative;height:calc(100vh - 320px);overflow-y:auto;border-radius:10px}
.grid-wrap::-webkit-scrollbar{width:6px}
.grid-wrap::-webkit-scrollbar-track{background:transparent}
.grid-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;padding:4px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:border-color 0.15s}
.card:hover{border-color:rgba(59,130,246,0.35)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.card-name{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.dr{font-size:0.7rem;font-weight:700;padding:2px 6px;border-radius:4px}
.dr-high{background:rgba(34,197,94,0.15);color:var(--green)}
.dr-mid{background:rgba(245,158,11,0.15);color:var(--orange)}
.dr-low{background:rgba(239,68,68,0.15);color:var(--red)}
.dr-na{background:rgba(113,113,122,0.1);color:var(--text3)}
.card-url{font-size:0.6rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:0.6rem;padding:2px 6px;border-radius:3px;white-space:nowrap}
.tag-type{background:rgba(168,85,247,0.12);color:var(--purple)}
.tag-tier{background:rgba(6,182,212,0.12);color:var(--cyan)}
.tag-tier-1{background:rgba(34,197,94,0.15);color:var(--green)}
.tag-tier-2{background:rgba(59,130,246,0.12);color:var(--blue)}
.tag-tier-3{background:rgba(113,113,122,0.1);color:var(--text3)}
.tag-df{font-weight:600}
.tag-df-true{background:rgba(34,197,94,0.12);color:var(--green)}
.tag-df-false{background:rgba(239,68,68,0.12);color:var(--red)}
.tag-df-maybe{background:rgba(245,158,11,0.12);color:var(--orange)}
.tag-df-unknown{background:rgba(113,113,122,0.08);color:var(--text3)}
.tag-lang{background:rgba(168,85,247,0.08);color:var(--text2)}
.tag-src{background:rgba(59,130,246,0.08);color:var(--text2)}
.tag-paid{background:rgba(245,158,11,0.1);color:var(--orange)}
.tag-free{background:rgba(34,197,94,0.08);color:var(--green)}
.card-bar{display:flex;align-items:center;gap:6px;margin-top:2px}
.bar-label{font-size:0.55rem;color:var(--text3);min-width:30px}
.bar-track{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.2s}
.bar-fill-easy{background:var(--green)}
.bar-fill-mid{background:var(--orange)}
.bar-fill-hard{background:var(--red)}
.card-desc{font-size:0.65rem;color:var(--text2);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Footer */
.foot{text-align:center;padding:12px 0;color:var(--text3);font-size:0.65rem;border-top:1px solid var(--border);margin-top:12px}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text3);font-size:0.85rem}

/* Export btn */
.export-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:0.7rem;cursor:pointer}
.export-btn:hover{border-color:var(--green);color:var(--green)}

@media(max-width:768px){
  .grid-inner{grid-template-columns:1fr}
  .flt{gap:6px}
  .fg select,.fg input{min-width:80px}
  .tier-legend{flex-direction:column;align-items:flex-start;gap:6px}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>外链资源池 Backlink Pool</h1>
    <div class="sub" id="sub">Loading...</div>
  </div>

  <div class="tier-legend">
    <div class="tl-item"><span class="tl-dot t1"></span><strong>Tier 1</strong><span class="tl-desc">— 高权威实体页（.edu/.gov/高DR citation），最强链接权重</span></div>
    <div class="tl-item"><span class="tl-dot t2"></span><strong>Tier 2</strong><span class="tl-desc">— 中等质量（Web 2.0、论坛、中DR目录），主力链接来源</span></div>
    <div class="tl-item"><span class="tl-dot t3"></span><strong>Tier 3</strong><span class="tl-desc">— 批量资产（书签、低DR profile），用于链接金字塔底层支撑</span></div>
  </div>

  <div class="stats" id="statsBar"></div>
  <div class="flt" id="filters">
    <div class="fg"><label>搜索</label><input type="text" id="fSearch" placeholder="域名 / URL / 描述..."></div>
    <div class="fg"><label>Type</label><select id="fType"><option value="">全部</option></select></div>
    <div class="fg"><label>Tier</label><select id="fTier"><option value="">全部</option><option>1</option><option>2</option><option>3</option></select></div>
    <div class="fg"><label>DR</label><select id="fDR"><option value="">全部</option><option value="90">90+</option><option value="70">70+</option><option value="50">50+</option><option value="30">30+</option><option value="0">&lt;30</option></select></div>
    <div class="fg"><label>Dofollow</label><select id="fDF"><option value="">全部</option><option>true</option><option>likely_true</option><option>false</option><option>likely_false</option><option>unknown</option></select></div>
    <div class="fg"><label>Source</label><select id="fSrc"><option value="">全部</option></select></div>
    <div class="fg"><label>Language</label><select id="fLang"><option value="">全部</option></select></div>
    <div class="fg"><label>Cost</label><select id="fCost"><option value="">全部</option><option>free</option><option>paid</option><option>freemium</option></select></div>
    <div class="fg"><label></label><button class="export-btn" onclick="exportCSV()">Export CSV</button></div>
  </div>
  <div class="sort-bar">
    <span>Sort:</span>
    <button class="sort-btn active" data-sort="dr" onclick="setSort('dr',this)">DR ↓</button>
    <button class="sort-btn" data-sort="diff" onclick="setSort('diff',this)">Difficulty ↑</button>
    <button class="sort-btn" data-sort="name" onclick="setSort('name',this)">Name A-Z</button>
    <button class="sort-btn" data-sort="tier" onclick="setSort('tier',this)">Tier ↑</button>
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="grid-wrap" id="gridWrap">
    <div class="grid-inner" id="grid"></div>
  </div>
  <div class="foot">Backlink Pool | <span id="footInfo">-</span></div>
</div>

<script>
let RAW = [];   // all records from JSON
let ALL = [];   // alive records only (DEAD filtered out)
let filtered = [];
let currentSort = 'dr';

// --- Init ---
async function init() {
  try {
    let res;
    try { res = await fetch('data/backlink-data.json'); } catch(e) {}
    if (!res || !res.ok) res = await fetch('../data/backlink-data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    RAW = json.records || json;
    // Filter out DEAD records for public display
    ALL = RAW.filter(r => !r.notes || !r.notes.startsWith('DEAD'));
    const deadCount = RAW.length - ALL.length;
    const meta = json.meta || {};
    document.getElementById('sub').textContent = `${ALL.length} 可用域名（已排除 ${deadCount} 条不可达）| Updated: ${meta.generated || '-'}`;
    document.getElementById('footInfo').textContent = `${ALL.length} alive / ${RAW.length} total`;
    buildFilterOptions();
    buildStats(meta.stats);
    applyFilters();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loading">Failed to load data: ' + e.message + '<br>Run: node build-backlink-html.mjs</div>';
  }
}

function buildFilterOptions() {
  const types = [...new Set(ALL.map(r => r.type).filter(Boolean))].sort();
  const srcs = [...new Set(ALL.map(r => r.source).filter(Boolean))].sort();
  const langs = [...new Set(ALL.map(r => r.language).filter(Boolean))].sort();
  fillSelect('fType', types);
  fillSelect('fSrc', srcs);
  fillSelect('fLang', langs);
}

function fillSelect(id, opts) {
  const el = document.getElementById(id);
  for (const o of opts) {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    el.appendChild(opt);
  }
}

function buildStats(s) {
  if (!s) return;
  const bar = document.getElementById('statsBar');
  const items = [
    { v: ALL.length, l: '可用域名' },
    { v: s.byTier['1'] || 0, l: 'Tier 1' },
    { v: s.byTier['2'] || 0, l: 'Tier 2' },
    { v: s.byTier['3'] || 0, l: 'Tier 3' },
    { v: s.byDofollow['true'] || 0, l: 'Dofollow' },
    { v: (s.byDofollow['true']||0)+(s.byDofollow['likely_true']||0), l: 'DF+Likely' },
    { v: s.byDofollow['unknown'] || 0, l: 'DF Unknown' },
    { v: Object.values(s.byType || {}).reduce((a,b)=>a+b,0) - (s.byType['bookmark']||0), l: '非书签' },
  ];
  bar.innerHTML = items.map(i => `<div class="st"><div class="st-v">${i.v}</div><div class="st-l">${i.l}</div></div>`).join('');
}

// --- Filtering ---
function applyFilters() {
  const search = document.getElementById('fSearch').value.toLowerCase();
  const type = document.getElementById('fType').value;
  const tier = document.getElementById('fTier').value;
  const dr = document.getElementById('fDR').value;
  const df = document.getElementById('fDF').value;
  const src = document.getElementById('fSrc').value;
  const lang = document.getElementById('fLang').value;
  const cost = document.getElementById('fCost').value;

  filtered = ALL.filter(r => {
    if (type && r.type !== type) return false;
    if (tier && r.tier !== tier) return false;
    if (df && r.dofollow !== df) return false;
    if (src && r.source !== src) return false;
    if (lang && r.language !== lang) return false;
    if (cost && r.free_or_paid !== cost) return false;
    if (dr) {
      const minDR = parseInt(dr);
      if (dr === '0') { if (r.dr != null && r.dr >= 30) return false; }
      else { if (r.dr == null || r.dr < minDR) return false; }
    }
    if (search) {
      const hay = ((r.domain||'') + ' ' + (r.url||'') + ' ' + (r.name||'') + ' ' + (r.desc||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  sortData();
  document.getElementById('resultCount').textContent = filtered.length + ' / ' + ALL.length;
  renderVisible();
}

// --- Sorting ---
function sortData() {
  const dir = { dr: -1, diff: 1, name: 1, tier: 1 }[currentSort] || 1;
  filtered.sort((a, b) => {
    let va, vb;
    if (currentSort === 'dr') { va = a.dr || 0; vb = b.dr || 0; }
    else if (currentSort === 'diff') { va = a.difficulty || 0; vb = b.difficulty || 0; }
    else if (currentSort === 'name') { va = (a.name||'').toLowerCase(); vb = (b.name||'').toLowerCase(); }
    else if (currentSort === 'tier') { va = parseInt(a.tier) || 9; vb = parseInt(b.tier) || 9; }
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });
}

function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sortData();
  renderVisible();
}

// --- Virtual Scroll Render ---
const CARD_HEIGHT = 130;
let lastStart = -1, lastEnd = -1;

function renderVisible() {
  const wrap = document.getElementById('gridWrap');
  const grid = document.getElementById('grid');

  const wrapW = wrap.clientWidth;
  const cols = Math.max(1, Math.floor((wrapW + 8) / 288));
  const rows = Math.ceil(filtered.length / cols);
  const totalH = rows * (CARD_HEIGHT + 8);
  grid.style.height = totalH + 'px';

  const scrollTop = wrap.scrollTop;
  const viewH = wrap.clientHeight;
  const startRow = Math.max(0, Math.floor(scrollTop / (CARD_HEIGHT + 8)) - 2);
  const endRow = Math.min(rows, Math.ceil((scrollTop + viewH) / (CARD_HEIGHT + 8)) + 2);
  const startIdx = startRow * cols;
  const endIdx = Math.min(filtered.length, endRow * cols);

  if (startIdx === lastStart && endIdx === lastEnd) return;
  lastStart = startIdx; lastEnd = endIdx;

  let html = '';
  for (let i = startIdx; i < endIdx; i++) {
    const r = filtered[i];
    const row = Math.floor(i / cols);
    const col = i % cols;
    const top = row * (CARD_HEIGHT + 8);
    const left = col * (100 / cols);

    const drClass = r.dr >= 80 ? 'dr-high' : r.dr >= 50 ? 'dr-mid' : r.dr ? 'dr-low' : 'dr-na';
    const tierClass = r.tier === '1' ? 'tag-tier-1' : r.tier === '2' ? 'tag-tier-2' : 'tag-tier-3';

    let dfClass = 'tag-df-unknown';
    if (r.dofollow === 'true') dfClass = 'tag-df-true';
    else if (r.dofollow === 'false') dfClass = 'tag-df-false';
    else if (r.dofollow && r.dofollow.startsWith('likely')) dfClass = 'tag-df-maybe';

    const diff = r.difficulty || 0;
    const barClass = diff <= 3 ? 'bar-fill-easy' : diff <= 6 ? 'bar-fill-mid' : 'bar-fill-hard';

    const costTag = r.free_or_paid ? `<span class="tag tag-${r.free_or_paid === 'free' ? 'free' : 'paid'}">${r.free_or_paid}</span>` : '';

    html += `<div class="card" style="position:absolute;top:${top}px;left:${left}%;width:calc(${100/cols}% - 8px)">
      <div class="card-top">
        <span class="card-name" title="${esc(r.name)}">${esc(r.name || r.domain)}</span>
        <span class="dr ${drClass}">${r.dr != null ? 'DR ' + r.dr : 'N/A'}</span>
      </div>
      <div class="card-url" title="${esc(r.url)}">${esc(r.url)}</div>
      <div class="card-tags">
        <span class="tag tag-type">${esc(r.type)}</span>
        <span class="tag ${tierClass}">T${esc(r.tier)}</span>
        <span class="tag tag-df ${dfClass}">${esc(r.dofollow)}</span>
        ${r.language && r.language !== 'en' ? '<span class="tag tag-lang">' + esc(r.language) + '</span>' : ''}
        ${costTag}
        ${r.source && r.source !== 'mixed' ? '<span class="tag tag-src">' + esc(r.source) + '</span>' : ''}
      </div>
      ${diff ? `<div class="card-bar"><span class="bar-label">Diff ${diff}</span><div class="bar-track"><div class="bar-fill ${barClass}" style="width:${diff*10}%"></div></div></div>` : ''}
      ${r.desc ? '<div class="card-desc">' + esc(r.desc) + '</div>' : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// --- Export ---
function exportCSV() {
  const header = ['domain','url','name','type','niche','dr','dofollow','difficulty','tier','free_or_paid','language','desc','source'];
  const rows = filtered.map(r => header.map(h => {
    const v = String(r[h] || '').replace(/"/g, '""');
    return '"' + v + '"';
  }).join(','));
  const csv = '\uFEFF' + header.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'backlink-pool-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// --- Events ---
document.getElementById('fSearch').addEventListener('input', applyFilters);
['fType','fTier','fDR','fDF','fSrc','fLang','fCost'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('gridWrap').addEventListener('scroll', () => { requestAnimationFrame(renderVisible); });
window.addEventListener('resize', () => { lastStart = -1; renderVisible(); });

init();
</script>
</body>
</html>
