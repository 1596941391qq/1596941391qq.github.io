<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>weihacking CRM</title>
<meta name="theme-color" content="#f8f9fb">
<link rel="manifest" href="./manifest.json">
<style>
:root{
  --bg:#f8f9fb;--surface:#ffffff;--surface2:#f1f3f5;
  --border:#e2e5ea;--border-hi:rgba(232,69,107,.35);
  --accent:#e8456b;--accent-dim:rgba(232,69,107,.1);
  --green:#059669;--green-dim:rgba(5,150,105,.1);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.1);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.1);
  --text:#1a1d23;--text2:#5f6577;--text3:#9ca3b4;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;font:inherit;color:inherit;border:none;background:none}
input,textarea,select{font:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

/* Shell */
.app{display:flex;flex-direction:column;height:100vh;max-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:18px;font-weight:800;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text3);font-weight:400;font-size:12px;letter-spacing:1px;margin-left:10px}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text2);transition:.15s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{color:var(--accent);background:var(--accent-dim)}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text2);font-size:18px;transition:.15s}
.icon-btn:hover{background:var(--surface);color:var(--text)}

/* Stats Bar */
.stats-bar{display:flex;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;min-width:120px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.3px}
.stat-val.accent{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:var(--blue)}

/* Kanban */
.kanban-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.kanban-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;flex-shrink:0}
.kanban-toolbar input{max-width:280px;font-size:13px}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}
.btn-ghost{color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;font-weight:600}
.kanban{display:flex;gap:12px;padding:0 20px 20px;flex:1;overflow-x:auto;overflow-y:hidden}
.column{min-width:260px;max-width:320px;flex:1;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.col-header{padding:14px 16px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-count{background:var(--surface2);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--text2);font-weight:600}
.col-body{flex:1;overflow-y:auto;padding:4px 8px 8px;display:flex;flex-direction:column;gap:6px}
.col-body.drag-over{background:var(--accent-dim)}
.col-header .arrow{display:none}

/* Card */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:grab;transition:border-color .15s,transform .1s;display:flex;gap:10px}
.card:hover{border-color:var(--text3)}
.card.dragging{opacity:.5;transform:rotate(2deg)}
.card-main{flex:1;min-width:0}
.card-side{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-sub{font-size:12px;color:var(--text2);line-height:1.4}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.badge-a{background:var(--green-dim);color:var(--green)}
.badge-b{background:var(--blue-dim);color:var(--blue)}
.badge-c{background:var(--yellow-dim);color:var(--yellow)}
.badge-d{background:var(--surface2);color:var(--text3)}
.badge-phone{background:var(--accent-dim);color:var(--accent)}
.badge-pri-high{background:rgba(239,68,68,.1);color:#dc2626}
.badge-pri-med{background:var(--yellow-dim);color:var(--yellow)}
.badge-pri-low{background:var(--green-dim);color:var(--green)}
.badge-step{background:rgba(139,92,246,.1);color:#7c3aed}
.card-step{font-size:12px;font-weight:700;color:#7c3aed;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:6px;padding:6px 10px;white-space:nowrap;text-align:center;line-height:1.3}
.card-phone{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-grid .full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.3px;text-transform:uppercase}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Timeline */
.timeline{border-left:2px solid var(--border);margin:12px 0 0 12px;padding-left:16px}
.tl-item{position:relative;padding-bottom:12px}
.tl-item::before{content:'';position:absolute;left:-21px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid #fff}
.tl-date{font-size:10px;color:var(--text3)}
.tl-text{font-size:12px;color:var(--text2);line-height:1.5}

/* Settings */
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)}
.settings-section p{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:2px;margin-top:12px}
.funnel-bar{display:flex;align-items:center;gap:8px;font-size:12px}
.funnel-fill{height:20px;border-radius:3px;transition:width .3s}
.funnel-label{min-width:70px;color:var(--text2);font-size:11px;text-align:right}

/* Sync status */
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-status.unsynced{color:var(--yellow)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* Trello-style Touch Drag Ghost */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  width:260px;background:var(--surface);border:2px solid var(--accent);
  border-radius:var(--radius);padding:12px 14px;
  box-shadow:0 12px 40px rgba(0,0,0,.12);opacity:.97;
  transform:rotate(2deg) scale(1.02);
  transition:transform .1s;
}
.drag-ghost .card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.drag-ghost .card-sub{font-size:12px;color:var(--text2)}
.drag-ghost .card-badges{margin-top:8px}
.drag-placeholder{height:56px;background:var(--accent-dim);border:2px dashed var(--accent);border-radius:var(--radius);margin-bottom:6px;transition:opacity .15s}

/* Responsive */
@media(min-width:769px){
  .kanban{overflow-x:auto;overflow-y:hidden;scroll-snap-type:none}
  .column{flex:1;min-width:240px;max-width:300px}
}
@media(max-width:768px){
@media(max-width:768px){
  /* === DEFAULT: Horizontal scroll + touch drag === */
  body{overflow:hidden}
  .topbar{padding:10px 12px;flex-shrink:0}
  .logo{font-size:16px}
  .logo span{display:none}
  .tabs .tab{padding:5px 10px;font-size:12px}
  .tabs .tab.active{background:var(--accent);color:#fff}
  .stats-bar{
    padding:8px 12px;gap:8px;flex-shrink:0;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  }

  .kanban-wrap{overflow:hidden;flex:1}

    padding:8px 12px;flex-shrink:0;

  }

  }

  }
  .column:last-child{border-right:none}

  body.mode-accordion .modal-overlay{align-items:flex-end;padding:0}
  body.mode-accordion .modal{
    max-width:100%;max-height:90vh;
    border-radius:16px 16px 0 0;
    padding:20px 16px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  body.mode-accordion .modal h2{font-size:16px;flex-wrap:wrap;word-break:break-all}
  body.mode-accordion .modal-overlay.open .modal{animation:slideUp .25s ease-out}
}
  .modal-grid{grid-template-columns:1fr}
  .modal-actions{flex-wrap:wrap}
  .modal-actions .btn{flex:1;min-width:0;text-align:center}
}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

<script>
// ═══════════════════════════════════════════
// Section 1: Config & Constants
// ═══════════════════════════════════════════
const CRM = { ui:{}, api:{}, state:{}, data:{} };
const STAGES = ['意向客户','试水期','正式期','暂停/流失'];
const TASK_STATUS = ['todo','in-progress','finish','review'];
const TASK_LABELS = {'todo':'Todo','in-progress':'In Progress','finish':'Finish','review':'Review'};
const SEGMENTS = ['A','B','C','D'];
const PRIORITIES = ['high','medium','low'];

// Stage sub-steps: each stage has an ordered list of action steps
const STAGE_STEPS = {};

const ALL_STEPS = new Set();

function deriveStep() { return ''; }

// ═══════════════════════════════════════════
// Section 2: State Manager
// ═══════════════════════════════════════════
CRM.state = {
  data: null,
  currentView: 'customers',
  searchQuery: '',
  writeQueue: [],
  writeTimer: null,
  syncStatus: 'synced',
  _remoteLoaded: false,

  defaultData() {
    return { meta:{ lastUpdated: new Date().toISOString(), version:1 }, customers:[], tasks:[] };
  },

  _merge(remote, local) {
    const mergeArrays = (a, b) => {
      const map = new Map();
      a.forEach(item => map.set(item.id, item));
      b.forEach(item => {
        const ex = map.get(item.id);
        if (!ex || new Date(item.updatedAt||item.createdAt||0) > new Date(ex.updatedAt||ex.createdAt||0)) {
          map.set(item.id, item);
        }
      });
      return Array.from(map.values());
    };
    return {
      meta: { ...remote.meta, lastUpdated: new Date().toISOString() },
      customers: mergeArrays(remote.customers||[], local.customers||[]),
      tasks: mergeArrays(remote.tasks||[], local.tasks||[])
    };
  },

  load() {
    const cached = localStorage.getItem('crm_cache');
    this.data = cached ? JSON.parse(cached) : this.defaultData();
    CRM.ui.render();
    CRM.api.fetch().then(remote => {
      if (remote) {
        if (!remote.meta) remote.meta = { lastUpdated: new Date().toISOString(), version:1 };
        if (!remote.tasks) remote.tasks = [];
        this.data = this._merge(remote, this.data);
        localStorage.setItem('crm_cache', JSON.stringify(this.data));
        CRM.ui.render();
      }
      this._remoteLoaded = true;
    }).catch(() => {
      this._remoteLoaded = true;
      console.log('Using cached data');
    });
  },

  save() {
    this.data.meta.lastUpdated = new Date().toISOString();
    const prev = localStorage.getItem('crm_cache');
    if (prev) localStorage.setItem('crm_cache_backup', prev);
    localStorage.setItem('crm_cache', JSON.stringify(this.data));
    this.queueWrite();
    CRM.ui.render();
  },

  queueWrite() {
    this.syncStatus = 'unsynced';
    CRM.ui.updateSyncStatus();
    clearTimeout(this.writeTimer);
    this.writeTimer = setTimeout(() => {
      CRM.api.push(this.data).then(() => {
        this.syncStatus = 'synced';
        CRM.ui.updateSyncStatus();
      }).catch(err => {
        console.error('Save failed:', err);
        this.syncStatus = 'error';
        CRM.ui.updateSyncStatus();
      });
    }, 1000);
  },

  addCustomer(c) {
    c.id = 'cust_' + Date.now();
    c.createdAt = new Date().toISOString();
    c.updatedAt = new Date().toISOString();
    c.stage = c.stage || '意向客户';
    c.segment = c.segment || 'B';
    c.activities = c.activities || [];
    this.data.customers.push(c);
    this.save();
  },
  updateCustomer(id, updates) {
    const c = this.data.customers.find(x => x.id === id);
    if (!c) return;
    const oldStage = c.stage;
    Object.assign(c, updates, { updatedAt: new Date().toISOString() });
    if (updates.stage && updates.stage !== oldStage) {
      c.activities = c.activities || [];
      c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text: `阶段变更: ${oldStage} → ${updates.stage}` });
    }
    this.save();
  },
  deleteCustomer(id) {
    this.data.customers = this.data.customers.filter(x => x.id !== id);
    this.data.tasks = this.data.tasks.filter(t => t.customerId === id);
    this.save();
  },
  getCustomer(id) { return this.data.customers.find(x => x.id === id); },

  addActivity(custId, text) {
    const c = this.getCustomer(custId);
    if (!c) return;
    c.activities = c.activities || [];
    c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text });
    c.updatedAt = new Date().toISOString();
    this.save();
  },

  addTask(t) {
    t.id = 'task_' + Date.now();
    t.createdAt = new Date().toISOString();
    t.status = t.status || 'todo';
    t.priority = t.priority || 'medium';
    this.data.tasks.push(t);
    this.save();
  },
  updateTask(id, updates) {
    const t = this.data.tasks.find(x => x.id === id);
    if (!t) return;
    Object.assign(t, updates);
    this.save();
  },
  deleteTask(id) {
    this.data.tasks = this.data.tasks.filter(x => x.id !== id);
    this.save();
  },

  getStats() {
    const cs = this.data.customers;
    const ts = this.data.tasks;
    const now = new Date();
    const weekAgo = new Date(now - 7*86400000);
    const stageCounts = {};
    STAGES.forEach(s => stageCounts[s] = 0);
    cs.forEach(c => { stageCounts[c.stage] = (stageCounts[c.stage]||0) + 1; });
    const today = now.toISOString().slice(0,10);
    const appointments = cs.filter(c => c.phoneAppointment && c.phoneAppointment.slice(0,10) === today);
    const overdue = ts.filter(t => t.dueDate && t.dueDate < today && t.status !== 'review' && t.status !== 'finish');
    const newThisWeek = cs.filter(c => new Date(c.createdAt) >= weekAgo).length;
    return { total: cs.length, stageCounts, appointments, overdue, newThisWeek, taskByStatus: TASK_STATUS.reduce((a,s)=>{a[s]=ts.filter(t=>t.status===s).length;return a},{}) };
  }
};

// ═══════════════════════════════════════════
// Section 3: jsonbin.io Adapter
// ═══════════════════════════════════════════
CRM.api = {
  MASTER_KEY: '$2a$10$rrgPsWpOrAxvSDxcFE9ZwuXN86bcZs1bozxCOQl1CracmhB/iqJIy',
  ACCESS_KEY: '$2a$10$FEg1GPK1vKxdk1DXMMLJsu1Id4dw5GHkgjhzYrAz.EmUSimEktHJq',
  BIN_ID: '69e647b336566621a8d28648',
  baseUrl: 'https://api.jsonbin.io/v3',

  async fetch() {
    try {
      const r = await fetch(`${this.baseUrl}/b/${this.BIN_ID}/latest`, {
        headers:{ 'X-Master-Key': this.MASTER_KEY, 'X-Access-Key': this.ACCESS_KEY }
      });
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j.record;
    } catch(e) { console.error('Fetch error:', e); return null; }
  },

  async push(data) {
    const r = await fetch(`${this.baseUrl}/b/${this.BIN_ID}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': this.MASTER_KEY, 'X-Access-Key': this.ACCESS_KEY },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('Push failed: ' + r.status);
  }
};

// ═══════════════════════════════════════════
// Section 4: Customer Module
// ═══════════════════════════════════════════
CRM.data.customerColumns = () => STAGES;

CRM.data.renderCustomerCard = (c) => {
  const segClass = 'badge-' + c.segment.toLowerCase();
  const skipTexts = ['更新了客户信息', '阶段变更:', '阶段更正:'];
  let latestAct = '';
  for (const a of (c.activities||[])) {
    const t = a.text || '';
    if (t && !skipTexts.some(s => t.startsWith(s))) { latestAct = t; break; }
  }
  return `<div class="card" draggable="true" data-id="${c.id}" data-type="customer">
    <div class="card-left">
      <div class="card-title">${esc(c.company||c.name)}</div>
      <div class="card-meta">${esc(c.name)}${c.website?' · '+esc(c.website.replace(/^https?:\/\//,'').replace(/\/.*$/,'')):''}</div>
    </div>
    <div class="card-right">
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <span class="badge ${segClass}">${c.segment}类</span>
        ${(c.services||[]).slice(0,1).map(s=>`<span class="badge" style="background:var(--blue-dim);color:var(--blue)">${esc(s)}</span>`).join('')}
      </div>
      ${latestAct ? `<span class="card-latest">${esc(latestAct)}</span>` : ''}
    </div>
  </div>`;
};

// ═══════════════════════════════════════════
// Section 5: Task Module
// ═══════════════════════════════════════════
CRM.data.renderTaskCard = (t) => {
  const priColor = {high:'#dc2626',medium:'#f59e0b',low:'#22c55e'}[t.priority]||'#f59e0b';
  const priLabel = {high:'紧急',medium:'普通',low:'低'}[t.priority]||'普通';
  const cust = t.customerId ? CRM.state.getCustomer(t.customerId) : null;
  const dueStr = t.dueDate ? (t.dueDate < new Date().toISOString().slice(0,10) ? '⚠ '+t.dueDate : t.dueDate) : '';
  return `<div class="card" draggable="true" data-id="${t.id}" data-type="task">
    <div class="pri-dot" style="background:${priColor}"></div>
    <div class="card-main" style="min-width:0">
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        <span class="pri-tag" style="color:${priColor};border-color:${priColor}20">${esc(priLabel)}</span>
        ${cust ? `<span>${esc(cust.company||cust.name)}</span>` : ''}
        ${dueStr ? `<span style="color:${t.dueDate<new Date().toISOString().slice(0,10)?'#dc2626':'var(--text3)'}">${dueStr}</span>` : ''}
      </div>
    </div>
  </div>`;
};

// ═══════════════════════════════════════════
// Section 6: UI Shell
// ═══════════════════════════════════════════
CRM.ui = {
  render() {
    this.renderStats();
    this.renderToolbar();
    this.renderKanban();
    this.checkAppointments();
  },

  renderStats() {
    const s = CRM.state.getStats();
    const bar = document.getElementById('statsBar');
    if (CRM.state.currentView === 'customers') {
      bar.innerHTML = `
        <div class="stat"><div class="stat-val accent">${s.total}</div><div class="stat-label">客户总数</div></div>
        <div class="stat"><div class="stat-val green">+${s.newThisWeek}</div><div class="stat-label">本周新增</div></div>
        <div class="stat"><div class="stat-val blue">${s.stageCounts['意向客户']||0}</div><div class="stat-label">意向客户</div></div>
        <div class="stat"><div class="stat-val">${s.stageCounts['试水期']||0}</div><div class="stat-label">试水期</div></div>
        <div class="stat"><div class="stat-val">${s.stageCounts['正式期']||0}</div><div class="stat-label">正式期</div></div>
        <div class="stat"><div class="stat-val accent">${s.appointments.length}</div><div class="stat-label">今日电话</div></div>
        <div class="stat sync-status ${CRM.state.syncStatus==='synced'?'':'unsynced'}" id="syncStatus">
          ${CRM.state.syncStatus==='synced'?'✓ 已同步':CRM.state.syncStatus==='unsynced'?'● 未同步':'✗ 同步失败'}
        </div>`;
    } else {
      bar.innerHTML = `
        <div class="stat"><div class="stat-val accent">${CRM.state.data.tasks.length}</div><div class="stat-label">任务总数</div></div>
        <div class="stat"><div class="stat-val" style="color:#ef4444">${s.overdue.length}</div><div class="stat-label">已逾期</div></div>
        <div class="stat"><div class="stat-val blue">${s.taskByStatus['todo']||0}</div><div class="stat-label">Todo</div></div>
        <div class="stat"><div class="stat-val">${s.taskByStatus['in-progress']||0}</div><div class="stat-label">In Progress</div></div>
        <div class="stat"><div class="stat-val green">${s.taskByStatus['finish']||0}</div><div class="stat-label">Finish</div></div>
        <div class="stat sync-status ${CRM.state.syncStatus==='synced'?'':'unsynced'}" id="syncStatus">
          ${CRM.state.syncStatus==='synced'?'✓ 已同步':CRM.state.syncStatus==='unsynced'?'● 未同步':'✗ 同步失败'}
        </div>`;
    }
  },

  renderToolbar() {
    const tb = document.getElementById('toolbar');
    if (CRM.state.currentView === 'customers') {
      tb.innerHTML = `<input type="text" placeholder="搜索客户..." value="${esc(CRM.state.searchQuery)}" oninput="CRM.state.searchQuery=this.value;CRM.ui.renderKanban()">
        <button class="btn btn-accent" onclick="CRM.ui.openCustomerForm()">+ 添加客户</button>
        <button class="btn btn-ghost" onclick="CRM.ui.exportJSON()">导出</button>
        <button class="btn btn-ghost" onclick="CRM.ui.openImportGuide()">导入</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="CRM.ui.importJSON(event)">`;
    } else {
      tb.innerHTML = `<input type="text" placeholder="搜索任务..." value="${esc(CRM.state.searchQuery)}" oninput="CRM.state.searchQuery=this.value;CRM.ui.renderKanban()">
        <button class="btn btn-accent" onclick="CRM.ui.openTaskForm()">+ 添加任务</button>`;
    }
  },

  renderKanban() {
    const kb = document.getElementById('kanban');
    const q = CRM.state.searchQuery.toLowerCase();
    const isAccordion = document.body.classList.contains('mode-accordion');
    if (CRM.state.currentView === 'customers') {
      const cols = STAGES;
      kb.innerHTML = cols.map(stage => {
        let cards = CRM.state.data.customers.filter(c => c.stage === stage);
        if (q) cards = cards.filter(c => (c.company+c.name+c.contact+(c.services||[]).join('')).toLowerCase().includes(q));
        const arrow = isAccordion ? '<span class="arrow">▶</span>' : '';
        const dragOver = isAccordion ? '' : 'ondragover="CRM.ui.onDragOver(event)"';
        const dragDrop = isAccordion ? '' : 'ondrop="CRM.ui.onDrop(event,\'customer\')"';
        const dragLeave = isAccordion ? '' : 'ondragleave="CRM.ui.onDragLeave(event)"';
        return `<div class="column" data-stage="${stage}">
          <div class="col-header" ${isAccordion?'onclick="CRM.ui._toggleColumn(this)"':''}>${arrow}<span>${stage}</span><span class="col-count">${cards.length}</span></div>
          <div class="col-body" ${dragOver} ${dragDrop} ${dragLeave}>${cards.length ? cards.map(c => CRM.data.renderCustomerCard(c)).join('') : '<div class="empty">暂无客户</div>'}</div>
        </div>`;
      }).join('');
    } else {
      kb.innerHTML = TASK_STATUS.map(status => {
        let cards = CRM.state.data.tasks.filter(t => t.status === status);
        if (q) cards = cards.filter(t => t.title.toLowerCase().includes(q));
        const priOrder = {high:0,medium:1,low:2};
        cards.sort((a,b) => (priOrder[a.priority]??1) - (priOrder[b.priority]??1));
        const arrow = isAccordion ? '<span class="arrow">▶</span>' : '';
        const dragOver = isAccordion ? '' : 'ondragover="CRM.ui.onDragOver(event)"';
        const dragDrop = isAccordion ? '' : 'ondrop="CRM.ui.onDrop(event,\'task\')"';
        const dragLeave = isAccordion ? '' : 'ondragleave="CRM.ui.onDragLeave(event)"';
        return `<div class="column" data-stage="${status}">
          <div class="col-header" ${isAccordion?'onclick="CRM.ui._toggleColumn(this)"':''}>${arrow}<span>${TASK_LABELS[status]}</span><span class="col-count">${cards.length}</span></div>
          <div class="col-body" ${dragOver} ${dragDrop} ${dragLeave}>${cards.length ? cards.map(t => CRM.data.renderTaskCard(t)).join('') : '<div class="empty">暂无任务</div>'}</div>
        </div>`;
      }).join('');
    }
    kb.querySelectorAll('.card[draggable]').forEach(card => {
      card.addEventListener('dragstart', CRM.ui.onDragStart);
      card.addEventListener('dragend', CRM.ui.onDragEnd);
      card.addEventListener('click', () => {
        const type = card.dataset.type;
        const id = card.dataset.id;
        if (type === 'customer') CRM.ui.openCustomerDetail(id);
        else CRM.ui.openTaskDetail(id);
      });
    });
    // Mobile accordion (max-height technique for smooth animation)
    if (isMobile) {
      const columns = kb.querySelectorAll('.column');
      // Helper: expand a column by setting max-height to scrollHeight
      const expandCol = (col) => {
        col.classList.add('expanded');
        const body = col.querySelector('.col-body');
        // Temporarily remove max-height to measure true content height
        body.style.maxHeight = 'none';
        const h = body.scrollHeight;
        body.style.maxHeight = h + 'px';
      };
      const collapseCol = (col) => {
        col.classList.remove('expanded');
        const body = col.querySelector('.col-body');
        body.style.maxHeight = '0';
      };
      // Preserve previously expanded stage
      const prevExpanded = this._mobileExpandedStage;
      if (prevExpanded) {
        const target = kb.querySelector(`.column[data-stage="${prevExpanded}"]`);
        if (target) expandCol(target);
      }
      // Fallback: expand first column with cards
      if (!kb.querySelector('.column.expanded')) {
        for (const col of columns) {
          if (col.querySelector('.col-body').children.length > 0 && !col.querySelector('.empty')) {
            expandCol(col);
            break;
          }
        }
        if (!kb.querySelector('.column.expanded') && columns.length) expandCol(columns[0]);
      }
      // Track expanded stage
      this._mobileExpandedStage = kb.querySelector('.column.expanded')?.dataset.stage;
      // Bind accordion toggle (exclusive: only one open at a time)
      columns.forEach(col => {
        col.querySelector('.col-header').addEventListener('click', (e) => {
          if (e.target.closest('.col-count')) return;
          const wasExpanded = col.classList.contains('expanded');
          columns.forEach(c => collapseCol(c));
          if (!wasExpanded) {
            expandCol(col);
            CRM.ui._mobileExpandedStage = col.dataset.stage;
          } else {
            CRM.ui._mobileExpandedStage = null;
          }
        });
      });
    }
  },

  // Drag & Drop
  _dragData: null,
  _touchDrag: { active: false, card: null, ghost: null, startX: 0, startY: 0, offsetX: 0, offsetY: 0 },
  onDragStart(e) {
    const card = e.target.closest('.card');
    CRM.ui._dragData = { id: card.dataset.id, type: card.dataset.type };
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  },
  onDragEnd(e) { e.target.classList.remove('dragging'); },
  onDragOver(e) { e.preventDefault(); e.currentTarget.querySelector('.col-body').classList.add('drag-over'); },
  onDragLeave(e) { e.currentTarget.querySelector('.col-body').classList.remove('drag-over'); },
  onDrop(e, type) {
    e.preventDefault();
    e.currentTarget.querySelector('.col-body').classList.remove('drag-over');
    const newStage = e.currentTarget.dataset.stage;
    const { id, type: srcType } = CRM.ui._dragData || {};
    if (!id || srcType !== type) return;
    if (type === 'customer') CRM.state.updateCustomer(id, { stage: newStage });
    else CRM.state.updateTask(id, { status: newStage });
  },

  // Touch drag for mobile
  _initTouchDrag() {
    document.addEventListener('touchstart', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const touch = e.touches[0];
      const rect = card.getBoundingClientRect();
      this._touchDrag = {
        active: true,
        card: card,
        id: card.dataset.id,
        type: card.dataset.type,
        ghost: null,
        startX: touch.clientX,
        startY: touch.clientY,
        offsetX: touch.clientX - rect.left,
        offsetY: touch.clientY - rect.top,
        origParent: card.parentElement,
        origNextSibling: card.nextElementSibling
      };
      card.classList.add('touch-dragging');
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      const td = this._touchDrag;
      if (!td.active) return;
      e.preventDefault();
      const touch = e.touches[0];
      const x = touch.clientX - td.offsetX;
      const y = touch.clientY - td.offsetY;

      if (!td.ghost) {
        td.ghost = document.createElement('div');
        td.ghost.className = 'drag-ghost';
        td.ghost.innerHTML = td.card.innerHTML;
        document.body.appendChild(td.ghost);
      }
      td.ghost.style.left = x + 'px';
      td.ghost.style.top = (y - 60) + 'px';

      // Find column under touch
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      const col = elemBelow?.closest('.column');
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      if (col) {
        col.classList.add('drag-over');
        const body = col.querySelector('.col-body');
        if (body) {
          // Insert placeholder above nearest card
          const cards = [...body.querySelectorAll('.card:not(.touch-dragging)')];
          body.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
          let inserted = false;
          for (const c of cards) {
            if (touch.clientY < c.getBoundingClientRect().top + c.offsetHeight / 2) {
              const ph = document.createElement('div');
              ph.className = 'drag-placeholder';
              c.parentElement.insertBefore(ph, c);
              inserted = true;
              break;
            }
          }
          if (!inserted) {
            const ph = document.createElement('div');
            ph.className = 'drag-placeholder';
            body.appendChild(ph);
          }
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      const td = this._touchDrag;
      if (!td.active) return;
      const touch = e.changedTouches[0];
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      const col = elemBelow?.closest('.column');

      // Clean up
      td.card?.classList.remove('touch-dragging');
      td.ghost?.remove();
      document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));

      if (col && td.id) {
        const newStage = col.dataset.stage;
        if (newStage) {
          if (td.type === 'customer') CRM.state.updateCustomer(td.id, { stage: newStage });
          else CRM.state.updateTask(td.id, { status: newStage });
        }
      }

      this._touchDrag = { active: false, card: null, ghost: null, startX: 0, startY: 0, offsetX: 0, offsetY: 0 };
    });
  },

  // Accordion toggle
  _mobileExpandedStage: null,
  _toggleColumn(header) {
    const col = header.closest('.column');
    const body = col.querySelector('.col-body');
    if (col.classList.contains('expanded')) {
      col.classList.remove('expanded');
      body.style.maxHeight = '0';
      this._mobileExpandedStage = null;
    } else {
      document.querySelectorAll('.column.expanded').forEach(c => {
        c.classList.remove('expanded');
        c.querySelector('.col-body').style.maxHeight = '0';
      });
      col.classList.add('expanded');
      body.style.maxHeight = 'none';
      const h = body.scrollHeight;
      body.style.maxHeight = h + 'px';
      this._mobileExpandedStage = col.dataset.stage;
    }
  },

  // Customer Form
  openCustomerForm(existing) {
    const c = existing || { name:'', company:'', website:'', contact:'', segment:'B', stage:'意向客户', services:[], phoneAppointment:'', phoneAppointmentNote:'', notes:'' };
    const isEdit = !!existing;
    document.getElementById('modalContent').innerHTML = `
      <h2>${isEdit?'编辑':'添加'}客户</h2>
      <div class="modal-grid">
        <div class="field"><label>联系人</label><input id="f_name" value="${esc(c.name)}"></div>
        <div class="field"><label>公司</label><input id="f_company" value="${esc(c.company)}"></div>
        <div class="field"><label>网站</label><input id="f_website" value="${esc(c.website)}" placeholder="https://"></div>
        <div class="field"><label>联系方式</label><input id="f_contact" value="${esc(c.contact)}" placeholder="微信: xxx"></div>
        <div class="field"><label>分级</label><select id="f_segment">${SEGMENTS.map(s=>`<option ${c.segment===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>阶段</label><select id="f_stage">${STAGES.map(s=>`<option ${c.stage===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>电话预约</label><input id="f_phone" type="datetime-local" value="${c.phoneAppointment?c.phoneAppointment.slice(0,16):''}"></div>
        <div class="field"><label>预约备注</label><input id="f_phoneNote" value="${esc(c.phoneAppointmentNote)}"></div>
        <div class="field full"><label>服务</label><input id="f_services" value="${esc((c.services||[]).join(', '))}" placeholder="用逗号分隔"></div>
        <div class="field full"><label>备注</label><textarea id="f_notes">${esc(c.notes)}</textarea></div>
      </div>
      <div class="modal-actions">
        ${isEdit?`<button class="btn btn-ghost" style="color:#ef4444;margin-right:auto" onclick="if(confirm('确认删除?')){CRM.state.deleteCustomer('${c.id}');CRM.ui.closeModal()}">删除</button>`:''}
        <button class="btn btn-ghost" onclick="CRM.ui.closeModal()">取消</button>
        <button class="btn btn-accent" onclick="CRM.ui.saveCustomer('${c.id||''}')">保存</button>
      </div>`;
    this.openModal();
  },

  saveCustomer(id) {
    const d = {
      name: document.getElementById('f_name').value.trim(),
      company: document.getElementById('f_company').value.trim(),
      website: document.getElementById('f_website').value.trim(),
      contact: document.getElementById('f_contact').value.trim(),
      segment: document.getElementById('f_segment').value,
      stage: document.getElementById('f_stage').value,
      phoneAppointment: document.getElementById('f_phone').value ? document.getElementById('f_phone').value+':00+08:00' : '',
      phoneAppointmentNote: document.getElementById('f_phoneNote').value.trim(),
      services: document.getElementById('f_services').value.split(',').map(s=>s.trim()).filter(Boolean),
      notes: document.getElementById('f_notes').value.trim()
    };
    if (!d.name && !d.company) return alert('至少填写联系人或公司名');
    if (id) {
      const c = CRM.state.getCustomer(id);
      if (!c) return;
      const oldStage = c.stage;
      Object.assign(c, d, { updatedAt: new Date().toISOString() });
      c.activities = c.activities || [];
      if (d.stage && d.stage !== oldStage) {
        c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text: `阶段变更: ${oldStage} → ${d.stage}` });
      }
      c.activities.unshift({ id: 'act_' + (Date.now() + 1), date: new Date().toISOString(), text: '更新了客户信息' });
      CRM.state.save();
    } else {
      CRM.state.addCustomer(d);
    }
    this.closeModal();
  },

  openCustomerDetail(id) {
    const c = CRM.state.getCustomer(id);
    if (!c) return;
    const acts = (c.activities||[]).slice(0, 20);
    document.getElementById('modalContent').innerHTML = `
      <h2 style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${esc(c.company||c.name)}
        <span class="badge badge-${c.segment.toLowerCase()}">${c.segment}类</span>
        <span class="badge" style="background:var(--accent-dim);color:var(--accent)">${c.stage}</span>
      </h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;color:var(--text2);margin-bottom:16px">
        ${c.name?`<div>联系人: ${esc(c.name)}</div>`:''}
        ${c.website?`<div>网站: ${esc(c.website)}</div>`:''}
        ${c.contact?`<div>联系: ${esc(c.contact)}</div>`:''}
        ${c.phoneAppointment?`<div>📞 ${new Date(c.phoneAppointment).toLocaleString('zh-CN')}</div>`:''}
        ${(c.services||[]).length?`<div>服务: ${c.services.map(s=>esc(s)).join(', ')}</div>`:''}
      </div>
      ${c.notes?`<div style="font-size:13px;color:var(--text2);padding:12px;background:var(--surface);border-radius:6px;margin-bottom:16px">${esc(c.notes)}</div>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3 style="font-size:14px">活动时间线</h3>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="CRM.ui.addActivityPrompt('${c.id}')">+ 添加记录</button>
      </div>
      ${acts.length ? `<div class="timeline">${acts.map(a=>{const aid=a.id||'';return `<div class="tl-item"><div class="tl-date">${new Date(a.date).toLocaleString('zh-CN')}</div><div class="tl-text">${esc(a.text)}</div><div style="display:flex;gap:4px;margin-top:2px"><button class="btn btn-ghost btn-sm" onclick="CRM.ui.editActivity('${c.id}','${aid}')">编辑</button><button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="CRM.ui.deleteActivity('${c.id}','${aid}')">删除</button></div></div>`}).join('')}</div>` : '<div class="empty">暂无活动记录</div>'}
      <div class="modal-actions">
        <button class="btn btn-ghost" style="color:#ef4444;margin-right:auto" onclick="if(confirm('确认删除?')){CRM.state.deleteCustomer('${c.id}');CRM.ui.closeModal()}">删除</button>
        <button class="btn btn-ghost" onclick="CRM.ui.closeModal()">关闭</button>
        <button class="btn btn-accent" onclick="CRM.ui.openCustomerForm(CRM.state.getCustomer('${c.id}'))">编辑</button>
      </div>`;
    this.openModal();
  },

  addActivityPrompt(custId) {
    const text = prompt('添加活动记录:');
    if (text && text.trim()) {
      CRM.state.addActivity(custId, text.trim());
      this.openCustomerDetail(custId);
    }
  },

  editActivity(custId, actId) {
    const c = CRM.state.getCustomer(custId);
    if (!c || !c.activities) return;
    const act = c.activities.find(a => a.id === actId);
    if (!act) return;
    const newText = prompt('编辑活动记录:', act.text);
    if (newText !== null && newText.trim()) {
      act.text = newText.trim();
      c.updatedAt = new Date().toISOString();
      CRM.state.save();
      this.openCustomerDetail(custId);
    }
  },

  deleteActivity(custId, actId) {
    const c = CRM.state.getCustomer(custId);
    if (!c || !c.activities) return;
    const idx = c.activities.findIndex(a => a.id === actId);
    if (idx === -1) return;
    if (confirm('确认删除该活动记录？')) {
      c.activities.splice(idx, 1);
      c.updatedAt = new Date().toISOString();
      CRM.state.save();
      this.openCustomerDetail(custId);
    }
  },

  // Task Forms
  openTaskForm(existing) {
    const t = existing || { title:'', customerId:'', priority:'medium', status:'todo', dueDate:'' };
    const isEdit = !!existing;
    const custs = CRM.state.data.customers;
    document.getElementById('modalContent').innerHTML = `
      <h2>${isEdit?'编辑':'添加'}任务</h2>
      <div class="modal-grid">
        <div class="field full"><label>标题</label><input id="tf_title" value="${esc(t.title)}"></div>
        <div class="field"><label>关联客户</label><select id="tf_cust"><option value="">-- 无 --</option>${custs.map(c=>`<option value="${c.id}" ${t.customerId===c.id?'selected':''}>${esc(c.company||c.name)}</option>`).join('')}</select></div>
        <div class="field"><label>优先级</label><select id="tf_pri">${PRIORITIES.map(p=>`<option ${t.priority===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="field"><label>状态</label><select id="tf_status">${TASK_STATUS.map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${TASK_LABELS[s]}</option>`).join('')}</select></div>
        <div class="field"><label>截止日期</label><input id="tf_due" type="date" value="${t.dueDate||''}"></div>
      </div>
      <div class="modal-actions">
        ${isEdit?`<button class="btn btn-ghost" style="color:#ef4444;margin-right:auto" onclick="if(confirm('确认删除?')){CRM.state.deleteTask('${t.id}');CRM.ui.closeModal()}">删除</button>`:''}
        <button class="btn btn-ghost" onclick="CRM.ui.closeModal()">取消</button>
        <button class="btn btn-accent" onclick="CRM.ui.saveTask('${t.id||''}')">保存</button>
      </div>`;
    this.openModal();
  },

  saveTask(id) {
    const d = {
      title: document.getElementById('tf_title').value.trim(),
      customerId: document.getElementById('tf_cust').value,
      priority: document.getElementById('tf_pri').value,
      status: document.getElementById('tf_status').value,
      dueDate: document.getElementById('tf_due').value
    };
    if (!d.title) return alert('请填写标题');
    if (id) CRM.state.updateTask(id, d);
    else CRM.state.addTask(d);
    this.closeModal();
  },

  openTaskDetail(id) { this.openTaskForm(CRM.state.data.tasks.find(t=>t.id===id)); },

  // Import Guide Modal
  openImportGuide() {
    document.getElementById('modalContent').innerHTML = `
      <h2>导入数据</h2>
      <div class="settings-section">
        <h3>⚠️ 导入前必读</h3>
        <p style="line-height:1.7">
          导入会<strong>整体覆盖</strong>当前数据，不是追加。如果你想把新数据加到现有数据里，请按以下步骤操作：
        </p>
        <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;margin:12px 0;font-size:12px;line-height:1.8;color:var(--text2)">
          <strong>追加数据的正确流程：</strong><br>
          1. 先点"导出"按钮，把当前数据下载为 JSON 文件<br>
          2. 在导出的 JSON 中，往 <code>customers</code> 和 <code>tasks</code> 数组里添加新记录<br>
          3. 新记录的 <code>id</code> 格式：<code>cust_时间戳</code> 或 <code>task_时间戳</code>（如 <code>cust_1745234567890</code>）<br>
          4. 新记录的 <code>createdAt</code> 和 <code>updatedAt</code> 填当前时间（ISO 格式）<br>
          5. 保存 JSON 后再点下方"选择文件"导入
        </div>
        <p style="color:var(--accent);font-size:12px">
          提示：也可以用 AI 把聊天记录转成 JSON，再合并到导出文件中。详见 README。
        </p>
      </div>
      <div style="margin-bottom:16px">
        <button class="btn btn-accent" onclick="document.getElementById('importFile').click()">选择 JSON 文件导入</button>
        <button class="btn btn-ghost" style="margin-left:8px" onclick="CRM.ui.exportJSON()">先导出当前数据</button>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="CRM.ui.closeModal()">取消</button></div>`;
    this.openModal();
  },

  // Settings
  openSettings() {
    const mode = localStorage.getItem('crm_mobile_mode') || 'swipe';
    const isSwipe = mode === 'swipe';
    document.getElementById('modalContent').innerHTML = `
      <h2>设置</h2>
      <div class="settings-section">
        <h3>移动端布局</h3>
        <p>选择手机上的看板显示方式：</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn ${isSwipe?'btn-accent':'btn-ghost'}" onclick="CRM.ui.setMobileMode('swipe')">横滑拖拽</button>
          <button class="btn ${!isSwipe?'btn-accent':'btn-ghost'}" onclick="CRM.ui.setMobileMode('accordion')">手风琴</button>
        </div>
        <p style="font-size:11px;color:var(--text3)">横滑：左右滑动切换列，长按拖拽卡片。手风琴：上下展开折叠，底部导航栏。</p>
      </div>
      <div class="settings-section">
        <h3>数据管理</h3>
        <p>数据通过 jsonbin.io 自动同步。</p>
        <button class="btn btn-ghost" onclick="CRM.ui.exportJSON()" style="margin-right:8px">导出 JSON</button>
        <button class="btn btn-ghost" onclick="CRM.ui.openImportGuide()">导入 JSON</button>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="CRM.ui.closeModal()">关闭</button></div>`;
    this.openModal();
  },

  setMobileMode(mode) {
    localStorage.setItem('crm_mobile_mode', mode);
    if (mode === 'accordion') document.body.classList.add('mode-accordion');
    else document.body.classList.remove('mode-accordion');
    this.openSettings();
  },

  saveSettings() {
    this.closeModal();
    CRM.state.load();
  },

  // Export / Import
  exportJSON() {
    const blob = new Blob([JSON.stringify(CRM.state.data, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `crm-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  },

  importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.customers) throw new Error('Invalid format');
        const existingC = CRM.state.data.customers.length;
        const existingT = CRM.state.data.tasks.length;
        if (!confirm(`⚠️ 导入会覆盖当前全部数据！\n\n当前：${existingC} 个客户、${existingT} 个任务\n导入：${data.customers.length} 个客户、${data.tasks?.length||0} 个任务\n\n如果是追加，建议先"导出"当前数据，合并后再导入。\n\n确认覆盖导入？`)) {
          e.target.value = '';
          return;
        }
        CRM.state.data = data;
        CRM.state.save();
      } catch(err) { alert('导入失败: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  },

  // Notifications
  checkAppointments() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') Notification.requestPermission();
    const now = new Date();
    CRM.state.data.customers.forEach(c => {
      if (!c.phoneAppointment) return;
      const apt = new Date(c.phoneAppointment);
      const diff = apt - now;
      if (diff > 0 && diff < 30*60*1000) {
        if (Notification.permission === 'granted') {
          new Notification(`📞 电话预约提醒`, { body: `${c.company||c.name} — ${apt.toLocaleTimeString('zh-CN')}`, tag: c.id });
        }
      }
    });
  },

  // Sync status
  updateSyncStatus() {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.className = 'sync-status ' + (CRM.state.syncStatus==='synced'?'':'unsynced');
    el.textContent = CRM.state.syncStatus==='synced'?'✓ 已同步':CRM.state.syncStatus==='unsynced'?'● 未同步':'✗ 同步失败';
  },

  openModal() { document.getElementById('modalOverlay').classList.add('open'); },
  closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
};

// ═══════════════════════════════════════════
// Section 7: Init
// ═══════════════════════════════════════════
function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    CRM.state.currentView = tab.dataset.view;
    CRM.state.searchQuery = '';
    CRM.ui.render();
  });
});

// Mobile bottom nav
document.querySelectorAll('.mobile-nav .nav-item').forEach(item => {
  item.addEventListener('click', () => {
    if (item.dataset.action === 'settings') {
      CRM.ui.openSettings();
      return;
    }
    document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    // Sync desktop tab state
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === item.dataset.view);
    });
    CRM.state.currentView = item.dataset.view;
    CRM.state.searchQuery = '';
    CRM.ui.render();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') CRM.ui.closeModal();
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.querySelector('.kanban-toolbar input')?.focus(); }
});

// Init mobile mode from localStorage
if (localStorage.getItem('crm_mobile_mode') === 'accordion') {
  document.body.classList.add('mode-accordion');
}

// Re-render on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => CRM.ui.render(), 150);
});

// Mobile bottom nav handlers (accordion mode)
document.querySelectorAll('.mobile-nav .nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const action = item.dataset.action;
    if (action === 'settings') {
      document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
      item.classList.add('active');
      CRM.ui.openSettings();
      return;
    }
    document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.topbar .tab').forEach(t=>t.classList.remove('active'));
    item.classList.add('active');
    const tab = document.querySelector(`.topbar .tab[data-view="${item.dataset.view}"]`);
    if (tab) tab.classList.add('active');
    CRM.state.currentView = item.dataset.view;
    CRM.state.searchQuery = '';
    CRM.ui.render();
  });
});

// Sync topbar tab clicks with mobile nav
document.querySelectorAll('.topbar .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const view = tab.dataset.view;
    if (!view) return;
    document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
    const navItem = document.querySelector(`.mobile-nav .nav-item[data-view="${view}"]`);
    if (navItem) navItem.classList.add('active');
  });
});

setInterval(() => CRM.ui.checkAppointments(), 300000);

CRM.state.load();
CRM.ui._initTouchDrag();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/crm/sw.js').catch(()=>{});
</script>
