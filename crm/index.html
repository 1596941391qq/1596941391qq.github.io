<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>weihacking CRM</title>
<meta name="theme-color" content="#f8f9fb">
<link rel="manifest" href="./manifest.json">
<style>
:root{
  --bg:#f8f9fb;--surface:#ffffff;--surface2:#f1f3f5;
  --border:#e2e5ea;--border-hi:rgba(232,69,107,.35);
  --accent:#e8456b;--accent-dim:rgba(232,69,107,.1);
  --green:#059669;--green-dim:rgba(5,150,105,.1);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.1);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.1);
  --text:#1a1d23;--text2:#5f6577;--text3:#9ca3b4;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;font:inherit;color:inherit;border:none;background:none}
input,textarea,select{font:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

/* Shell */
.app{display:flex;flex-direction:column;height:100vh;max-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:18px;font-weight:800;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text3);font-weight:400;font-size:12px;letter-spacing:1px;margin-left:10px}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text2);transition:.15s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{color:var(--accent);background:var(--accent-dim)}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text2);font-size:18px;transition:.15s}
.icon-btn:hover{background:var(--surface);color:var(--text)}

/* Stats Bar */
.stats-bar{display:flex;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;min-width:120px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.3px}
.stat-val.accent{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:var(--blue)}

/* Kanban */
.kanban-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.kanban-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;flex-shrink:0}
.kanban-toolbar input{max-width:280px;font-size:13px}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}
.btn-ghost{color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;font-weight:600}
.kanban{display:flex;gap:12px;padding:0 20px 20px;flex:1;overflow-x:auto;overflow-y:hidden;transform-origin:0 0;transition:transform .15s ease}
.column{min-width:260px;max-width:320px;flex:1;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.col-header{padding:14px 16px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-count{background:var(--surface2);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--text2);font-weight:600}
.col-body{flex:1;overflow-y:auto;padding:4px 8px 8px;display:flex;flex-direction:column;gap:6px}
.col-body.drag-over{background:var(--accent-dim)}
.col-header .arrow{display:none}

/* Card */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:grab;transition:border-color .15s,transform .1s;display:flex;gap:10px}
.card:hover{border-color:var(--text3)}
.card.dragging{opacity:.5;transform:rotate(2deg)}
.card-main{flex:1;min-width:0}
.card-side{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-sub{font-size:12px;color:var(--text2);line-height:1.4}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.badge-a{background:var(--green-dim);color:var(--green)}
.badge-b{background:var(--blue-dim);color:var(--blue)}
.badge-c{background:var(--yellow-dim);color:var(--yellow)}
.badge-d{background:var(--surface2);color:var(--text3)}
.badge-phone{background:var(--accent-dim);color:var(--accent)}
.badge-pri-high{background:rgba(239,68,68,.1);color:#dc2626}
.badge-pri-med{background:var(--yellow-dim);color:var(--yellow)}
.badge-pri-low{background:var(--green-dim);color:var(--green)}
.badge-step{background:rgba(139,92,246,.1);color:#7c3aed}
.card-step{font-size:12px;font-weight:700;color:#7c3aed;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:6px;padding:6px 10px;white-space:nowrap;text-align:center;line-height:1.3}
.card-phone{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600}

/* Mobile Nav (hidden by default, shown in accordion mode) */
.mobile-nav{display:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-grid .full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.3px;text-transform:uppercase}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Timeline */
.timeline{border-left:2px solid var(--border);margin:12px 0 0 12px;padding-left:16px}
.tl-item{position:relative;padding-bottom:12px}
.tl-item::before{content:'';position:absolute;left:-21px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid #fff}
.tl-date{font-size:10px;color:var(--text3)}
.tl-text{font-size:12px;color:var(--text2);line-height:1.5}

/* Settings */
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)}
.settings-section p{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:2px;margin-top:12px}
.funnel-bar{display:flex;align-items:center;gap:8px;font-size:12px}
.funnel-fill{height:20px;border-radius:3px;transition:width .3s}
.funnel-label{min-width:70px;color:var(--text2);font-size:11px;text-align:right}

/* Sync status */
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-status.unsynced{color:var(--yellow)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* Trello-style Touch Drag Ghost */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  background:var(--surface);border:2px solid var(--accent);
  border-radius:var(--radius);padding:12px 14px;
  box-shadow:0 16px 48px rgba(0,0,0,.22);
  opacity:0;transform:scale(1);
  transition:opacity .15s ease,transform .15s ease;
}
.drag-ghost.visible{opacity:.95;transform:scale(1.03) rotate(1deg)}
.drag-ghost .card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.drag-ghost .card-sub{font-size:12px;color:var(--text2)}
.drag-ghost .card-badges{margin-top:8px}
.drag-placeholder{height:56px;background:var(--accent-dim);border:2px dashed var(--accent);border-radius:var(--radius);margin-bottom:6px;transition:opacity .15s}
.card.touch-dragging{opacity:.35;transform:scale(.96);pointer-events:none;touch-action:none}
.card.long-pressing{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,0,.1)}

/* Responsive */
@media(min-width:769px){
  .kanban{overflow-x:auto;overflow-y:hidden;scroll-snap-type:none}
  .column{flex:1;min-width:240px;max-width:300px}
}
@media(max-width:768px){
  /* === DEFAULT: Horizontal scroll + touch drag === */
  body{overflow:hidden}
  .topbar{padding:10px 12px;flex-shrink:0}
  .logo{font-size:16px}
  .logo span{display:none}
  .tabs .tab{padding:5px 10px;font-size:12px}
  .tabs .tab.active{background:var(--accent);color:#fff}
  .stats-bar{
    padding:8px 12px;gap:8px;flex-shrink:0;
    -webkit-overflow-scrolling:touch;
  }
  .stat{padding:8px 10px;min-width:90px;}
  .kanban-wrap{overflow:hidden;flex:1}
  .kanban-toolbar{
    padding:8px 12px;flex-shrink:0;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .kanban-toolbar input{max-width:160px;flex-shrink:0}
  .kanban{
    flex:1;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    padding:0;gap:0;
  }
  .column{
    min-width:88vw;max-width:88vw;flex-shrink:0;
    border-radius:0;
    border-left:none;border-right:none;
    display:flex;flex-direction:column;
  }
  .column:last-child{border-right:none}
  .column.drag-over{background:var(--accent-dim);border-color:var(--accent)}
  .col-body{min-height:120px;max-height:calc(100vh - 220px);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .card{position:relative;cursor:grab;-webkit-user-select:none;user-select:none}
  .card:active,.card.touch-dragging{cursor:grabbing}
  .btn{padding:6px 12px;font-size:12px}
  .modal{max-width:100%;padding:16px;border-radius:12px 12px 0 0;max-height:90vh;position:fixed;bottom:0;left:0;right:0;top:auto;margin:0;border-bottom:none}
  .modal-overlay{align-items:flex-end;padding:0}

  /* === ACCORDION MODE (body.mode-accordion) === */
  body.mode-accordion{overflow-y:auto;-webkit-overflow-scrolling:touch}
  body.mode-accordion .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);
    padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;gap:4px;
    box-shadow:0 -2px 12px rgba(0,0,0,.06);
  }
  body.mode-accordion .nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;
    gap:3px;font-size:10px;font-weight:600;
    color:var(--text3);padding:8px 4px;
    border-radius:12px;transition:all .2s;
    min-height:52px;background:transparent;
  }
  body.mode-accordion .nav-item:active{transform:scale(.93)}
  body.mode-accordion .nav-item.active{color:var(--accent);background:var(--accent-dim)}
  body.mode-accordion .nav-item svg{transition:transform .2s}
  body.mode-accordion .nav-item.active svg{transform:scale(1.1)}
  body.mode-accordion .topbar .tabs{display:none}
  body.mode-accordion .topbar .icon-btn{display:none}
  body.mode-accordion .topbar{padding:10px 12px;gap:0}
  body.mode-accordion .app{height:auto;max-height:none;min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  body.mode-accordion .kanban-wrap{flex:unset;overflow:visible}
  body.mode-accordion .stats-bar{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    gap:6px;padding:8px 12px;overflow:visible;
  }
  body.mode-accordion .stat{min-width:unset;padding:8px 6px;text-align:center}
  body.mode-accordion .stat-val{font-size:17px}
  body.mode-accordion .stat-label{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  body.mode-accordion .sync-status{display:none}
  body.mode-accordion .kanban-toolbar{flex-wrap:wrap;padding:8px 12px}
  body.mode-accordion .kanban-toolbar input{max-width:100%;order:0}
  body.mode-accordion .kanban-toolbar .btn-ghost{display:none}
  body.mode-accordion .kanban{
    flex-direction:column;overflow:visible;
    padding:8px 0 12px;gap:0;flex:unset;
  }
  body.mode-accordion .column{
    min-width:100%;max-width:100%;
    border-radius:0;border-left:0;border-right:0;
    border-bottom:1px solid var(--border);
    background:var(--bg);overflow:visible;
  }
  body.mode-accordion .column:first-child{border-top:none}
  body.mode-accordion .col-header{
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
    padding:16px 16px;font-size:15px;font-weight:600;
    display:flex;align-items:center;gap:10px;flex-shrink:0;
    background:var(--surface);border-bottom:1px solid transparent;
    transition:border-color .2s;
  }
  body.mode-accordion .col-header .arrow{
    width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    background:var(--surface2);border-radius:6px;
    transition:transform .25s ease,background .2s;flex-shrink:0;
    font-size:9px;color:var(--text3);
  }
  body.mode-accordion .column.expanded .col-header .arrow{transform:rotate(90deg);background:var(--accent-dim);color:var(--accent)}
  body.mode-accordion .column.expanded .col-header{border-bottom:1px solid var(--border)}
  body.mode-accordion .col-header span:nth-child(2){flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px}
  body.mode-accordion .col-count{
    flex-shrink:0;font-size:12px;font-weight:700;
    background:var(--surface2);border-radius:8px;
    padding:3px 10px;color:var(--text2);
    min-width:28px;text-align:center;
  }
  body.mode-accordion .column.expanded .col-count{background:var(--accent-dim);color:var(--accent)}
  body.mode-accordion .col-body{
    min-height:0;max-height:0;overflow:hidden;padding:0;
    transition:max-height .35s ease-out,padding .2s ease-out;
  }
  body.mode-accordion .column.expanded{background:var(--surface)}
  body.mode-accordion .column.expanded .col-body{
    max-height:2000px;padding:8px 12px 12px;background:var(--bg);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  body.mode-accordion .card{
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    padding:10px 12px;gap:10px;flex-wrap:nowrap;align-items:flex-start;
    border-radius:10px;margin-bottom:4px;
  }
  body.mode-accordion .card-left{min-width:0;flex:1;overflow:hidden}
  body.mode-accordion .card-right{
    display:flex;flex-direction:column;align-items:flex-end;gap:3px;
    flex-shrink:0;max-width:55%;
  }
  body.mode-accordion .card-main{min-width:0;flex:1;overflow:visible}
  body.mode-accordion .card-title{font-size:13px;font-weight:600;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  body.mode-accordion .card-sub,body.mode-accordion .card-meta{font-size:11px;line-height:1.35;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  body.mode-accordion .card:active{background:var(--border);transform:scale(.98);transition:transform .1s}
  body.mode-accordion .card-badges{flex-wrap:wrap;gap:5px}
  body.mode-accordion .badge{font-size:10px;padding:3px 9px;border-radius:6px;white-space:nowrap}
  body.mode-accordion .btn{min-height:44px}
  body.mode-accordion .btn-sm{min-height:36px}
  body.mode-accordion .modal-overlay{align-items:flex-end;padding:0}
  body.mode-accordion .modal{
    max-width:100%;max-height:90vh;
    border-radius:16px 16px 0 0;
    padding:20px 16px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  body.mode-accordion .modal h2{font-size:16px;flex-wrap:wrap;word-break:break-all}
  body.mode-accordion .modal-overlay.open .modal{animation:slideUp .25s ease-out}
  body.mode-accordion .modal-grid{grid-template-columns:1fr}
  body.mode-accordion .modal-actions{flex-wrap:wrap}
  body.mode-accordion .modal-actions .btn{flex:1;min-width:0;text-align:center}
}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

/* Accounting */
.acct-subtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.acct-subtab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text2);background:var(--surface2);transition:.15s}
.acct-subtab:hover{color:var(--text)}
.acct-subtab.active{color:#fff;background:var(--accent)}
.acct-wrap{padding:0 20px 20px;overflow-y:auto;flex:1}
.txn-list{display:flex;flex-direction:column;gap:6px}
.txn-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s}
.txn-row:hover{border-color:var(--text3)}
.txn-date{font-size:12px;color:var(--text3);min-width:80px;flex-shrink:0}
.txn-cat{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.txn-cat.income{background:var(--green-dim);color:var(--green)}
.txn-cat.expense{background:rgba(239,68,68,.1);color:#dc2626}
.txn-desc{flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.txn-amount{font-size:15px;font-weight:700;flex-shrink:0;text-align:right;white-space:nowrap}
.txn-amount.income{color:var(--green)}
.txn-amount.expense{color:#dc2626}
.inv-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:700}
.inv-status.pending{background:var(--yellow-dim);color:var(--yellow)}
.inv-status.paid{background:var(--green-dim);color:var(--green)}
.inv-status.overdue{background:rgba(239,68,68,.1);color:#dc2626}
.inv-status.cancelled{background:var(--surface2);color:var(--text3)}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;overflow:hidden}
.dash-card.full{grid-column:1/-1}
.dash-card h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.3px}
.dash-big{font-size:28px;font-weight:800;line-height:1}
.dash-big.positive{color:var(--green)}
.dash-big.negative{color:#dc2626}
.dash-big.neutral{color:var(--text)}
.dash-sub{font-size:11px;color:var(--text3);margin-top:4px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.bar-label{min-width:60px;text-align:right;color:var(--text2);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:#fff;min-width:24px}
.bar-fill.green{background:var(--green)}
.bar-fill.red{background:#ef4444}
.bar-fill.blue{background:var(--blue)}
.bar-fill.accent{background:var(--accent)}
.bar-fill.purple{background:#7c3aed}
.bar-val{font-size:11px;color:var(--text3);min-width:50px;text-align:right;flex-shrink:0}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:4px;font-size:12px}
.donut-legend span{display:flex;align-items:center;gap:6px}
.donut-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Mobile accounting */
@media(max-width:768px){
  .dash-grid{grid-template-columns:1fr;gap:10px}
  .dash-big{font-size:22px}
  .txn-row{flex-wrap:wrap;gap:6px 10px;padding:10px 12px}
  .txn-date{min-width:auto;font-size:11px}
  .txn-desc{min-width:60%;flex-basis:60%}
  .txn-amount{flex-basis:auto;font-size:14px}
  .bar-label{min-width:48px;font-size:10px}
  .donut-wrap{flex-direction:column;align-items:flex-start}
  .acct-wrap{padding:0 12px 12px}

<script>
// ═══════════════════════════════════════════
// Section 1: Config & Constants
// ═══════════════════════════════════════════
const CRM = { ui:{}, api:{}, state:{}, data:{} };
const STAGES = ['意向客户','试水期','正式期','暂停/流失'];
const TASK_STATUS = ['todo','in-progress','finish','review'];
const TASK_LABELS = {'todo':'Todo','in-progress':'In Progress','finish':'Finish','review':'Review'};
const SEGMENTS = ['A','B','C','D'];
const PRIORITIES = ['high','medium','low'];
const TXN_CATEGORIES_INCOME = ['客户付款','退款','其他收入'];
const TXN_CATEGORIES_EXPENSE = ['服务器/VPS','ADS账号','API费用','代理IP','TikHub','Apify','外包/工资','营销费用','合同/法律','办公/工具','其他支出'];
const INV_STATUS = ['pending','paid','overdue','cancelled'];
const INV_LABELS = {'pending':'待收款','paid':'已收款','overdue':'已逾期','cancelled':'已取消'};
const CURRENCIES = ['USD','CNY','HKD'];
const FIXED_COST_PERIODS = ['monthly','yearly'];
const EXCHANGE_RATES = {USD:1, CNY:0.14, HKD:0.13};
function toUSD(amount, currency) {
  if (!currency || !EXCHANGE_RATES.hasOwnProperty(currency)) {
    console.warn('toUSD: unknown currency', currency, 'amount:', amount);
    return (amount||0); // treat as USD-equivalent number
  }
  return (amount||0) * EXCHANGE_RATES[currency];
}
const CURRENCY_SYMBOLS = {USD:'$', CNY:'¥', HKD:'HK$'};

// Stage sub-steps: each stage has an ordered list of action steps
const STAGE_STEPS = {};

const ALL_STEPS = new Set();

function deriveStep() { return ''; }

// ═══════════════════════════════════════════
// Section 2: State Manager
// ═══════════════════════════════════════════
CRM.state = {
  data: null,
  currentView: 'customers',
  searchQuery: '',
  writeQueue: [],
  writeTimer: null,
  syncStatus: 'synced',
  _remoteLoaded: false,

  defaultData() {
    return { meta:{ lastUpdated: new Date().toISOString(), version:1 }, customers:[], tasks:[], transactions:[], invoices:[], fixedCosts:[] };
  },

  _merge(remote, local) {
    const mergeArrays = (a, b) => {
      const map = new Map();
      a.forEach(item => map.set(item.id, item));
      b.forEach(item => {
        const ex = map.get(item.id);
        if (!ex || new Date(item.updatedAt||item.createdAt||0) > new Date(ex.updatedAt||ex.createdAt||0)) {
          map.set(item.id, item);
        }
      });
      return Array.from(map.values());
    };
    const remoteTasks = Array.isArray(remote.tasks) ? remote.tasks : [];
    const localTasks = Array.isArray(local.tasks) ? local.tasks : [];
    const remoteCusts = Array.isArray(remote.customers) ? remote.customers : [];
    const localCusts = Array.isArray(local.customers) ? local.customers : [];
    const remoteTxns = Array.isArray(remote.transactions) ? remote.transactions : [];
    const localTxns = Array.isArray(local.transactions) ? local.transactions : [];
    const remoteInvs = Array.isArray(remote.invoices) ? remote.invoices : [];
    const localInvs = Array.isArray(local.invoices) ? local.invoices : [];
    const remoteFC = Array.isArray(remote.fixedCosts) ? remote.fixedCosts : [];
    const localFC = Array.isArray(local.fixedCosts) ? local.fixedCosts : [];
    // Protect: never let an empty array wipe existing data
    const tasks = remoteTasks.length > 0 ? mergeArrays(remoteTasks, localTasks) : localTasks;
    const customers = remoteCusts.length > 0 ? mergeArrays(remoteCusts, localCusts) : localCusts;
    const transactions = remoteTxns.length > 0 ? mergeArrays(remoteTxns, localTxns) : localTxns;
    const invoices = remoteInvs.length > 0 ? mergeArrays(remoteInvs, localInvs) : localInvs;
    const fixedCosts = remoteFC.length > 0 ? mergeArrays(remoteFC, localFC) : localFC;
    return {
      meta: { ...(remote.meta||{}), lastUpdated: new Date().toISOString() },
      customers, tasks, transactions, invoices, fixedCosts
    };
  },

  load() {
    // Show loading state
    document.getElementById('kanban').innerHTML = '<div style="padding:40px;text-align:center;color:#666">正在从云端加载数据...</div>';
    // Skip stale localStorage cache, always prefer cloud
    const cached = localStorage.getItem('crm_cache');
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        // Only use cache if it has actual data
        if ((parsed.customers?.length > 0) || (parsed.tasks?.length > 0)) {
          this.data = parsed;
        } else {
          this.data = this.defaultData();
        }
      } catch(e) { this.data = this.defaultData(); }
    } else {
      this.data = this.defaultData();
    }
    CRM.api.fetch().then(remote => {
      const dbg = document.getElementById('debugInfo');
      if (remote) {
        console.log('Cloud data loaded:', remote.customers?.length, 'customers,', remote.tasks?.length, 'tasks');
        this.data = this._merge(remote, this.data);
        localStorage.setItem('crm_cache', JSON.stringify(this.data));
        if (dbg) dbg.style.display = 'none';
        CRM.ui.render();
      } else {
        console.log('Remote returned null, using local');
        if (dbg) { dbg.style.display = 'block'; dbg.textContent = '⚠️ 云端返回空数据，使用本地缓存'; }
        CRM.ui.render();
      }
      this._remoteLoaded = true;
    }).catch(err => {
      this._remoteLoaded = true;
      console.error('Cloud fetch failed:', err);
      const dbg = document.getElementById('debugInfo');
      if (dbg) { dbg.style.display = 'block'; dbg.textContent = '⚠️ 网络请求失败: ' + err.message; }
      CRM.ui.render();
    });
  },

  save() {
    this.data.meta.lastUpdated = new Date().toISOString();
    try {
      const prev = localStorage.getItem('crm_cache');
      if (prev) { try { localStorage.setItem('crm_cache_backup', prev); } catch(e) {} }
      localStorage.setItem('crm_cache', JSON.stringify(this.data));
    } catch(e) {
      console.error('localStorage save failed:', e);
      const el = document.getElementById('syncStatus');
      if (el) { el.textContent = '⚠ 本地存储失败'; el.classList.add('unsynced'); }
    }
    this.queueWrite();
    CRM.ui.render();
  },

  queueWrite() {
    this.syncStatus = 'unsynced';
    CRM.ui.updateSyncStatus();
    clearTimeout(this.writeTimer);
    this.writeTimer = setTimeout(() => {
      CRM.api.push(this.data).then(() => {
        this.syncStatus = 'synced';
        // Clear purge flags after successful push
        if (this.data.meta && this.data.meta._purged) {
          delete this.data.meta._purged;
        }
        CRM.ui.updateSyncStatus();
      }).catch(err => {
        console.error('Save failed:', err);
        this.syncStatus = 'error';
        CRM.ui.updateSyncStatus();
      });
    }, 1000);
  },

  addCustomer(c) {
    c.id = 'cust_' + Date.now();
    c.createdAt = new Date().toISOString();
    c.updatedAt = new Date().toISOString();
    c.stage = c.stage || '意向客户';
    c.segment = c.segment || 'B';
    c.activities = c.activities || [];
    this.data.customers.push(c);
    this.save();
  },
  updateCustomer(id, updates) {
    const c = this.data.customers.find(x => x.id === id);
    if (!c) return;
    const oldStage = c.stage;
    Object.assign(c, updates, { updatedAt: new Date().toISOString() });
    if (updates.stage && updates.stage !== oldStage) {
      c.activities = c.activities || [];
      c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text: `阶段变更: ${oldStage} → ${updates.stage}` });
    }
    this.save();
  },
  deleteCustomer(id) {
    this.data.customers = this.data.customers.filter(x => x.id !== id);
    this.data.tasks = this.data.tasks.filter(t => t.customerId === id);
    this.save();
  },
  getCustomer(id) { return this.data.customers.find(x => x.id === id); },

  addActivity(custId, text) {
    const c = this.getCustomer(custId);
    if (!c) return;
    c.activities = c.activities || [];
    c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text });
    c.updatedAt = new Date().toISOString();
    this.save();
  },

  addTask(t) {
    t.id = 'task_' + Date.now();
    t.createdAt = new Date().toISOString();
    t.status = t.status || 'todo';
    t.priority = t.priority || 'medium';
    this.data.tasks.push(t);
    this.save();
  },
  updateTask(id, updates) {
    const t = this.data.tasks.find(x => x.id === id);
    if (!t) return;
    Object.assign(t, updates, { updatedAt: new Date().toISOString() });
    this.save();
  },
  deleteTask(id) {
    this.data.tasks = this.data.tasks.filter(x => x.id !== id);
    this.save();
  },

  // Transaction CRUD
  addTransaction(t, _skipSave) {
    t.id = 'txn_' + Date.now();
    t.createdAt = new Date().toISOString();
    t.updatedAt = new Date().toISOString();
    this.data.transactions.push(t);
    if (!_skipSave) this.save();
  },
  updateTransaction(id, updates) {
    const t = this.data.transactions.find(x => x.id === id);
    if (!t) return;
    Object.assign(t, updates, { updatedAt: new Date().toISOString() });
    this.save();
  },
  deleteTransaction(id) {
    this.data.transactions = this.data.transactions.filter(x => x.id !== id);
    this.save();
  },

  // Purge all data of a type (bypasses empty array guard)
  purgeData(key) {
    if (['tasks','transactions','invoices','fixedCosts','customers'].includes(key)) {
      this.data[key] = [];
      this.data.meta = this.data.meta || {};
      this.data.meta._purged = this.data.meta._purged || [];
      if (!this.data.meta._purged.includes(key)) this.data.meta._purged.push(key);
      this.save();
    }
  },

  // Invoice CRUD
  addInvoice(inv) {
    inv.id = 'inv_' + Date.now();
    inv.createdAt = new Date().toISOString();
    inv.updatedAt = new Date().toISOString();
    this.data.invoices.push(inv);
    this.save();
  },
  updateInvoice(id, updates) {
    const inv = this.data.invoices.find(x => x.id === id);
    if (!inv) return;
    const oldStatus = inv.status;
    // Strip internal flags before writing to data
    const { _skipAutoTxn, ...cleanUpdates } = updates;
    Object.assign(inv, cleanUpdates, { updatedAt: new Date().toISOString() });
    // Auto-create income transaction when invoice is marked as paid (skip double save)
    // Guard: only create if no linked transaction already exists
    if (cleanUpdates.status === 'paid' && oldStatus !== 'paid' && !_skipAutoTxn) {
      const alreadyLinked = (this.data.transactions||[]).find(t => t.linkedInvoiceId === id);
      if (!alreadyLinked) {
        this.addTransaction({
          type: 'income',
          category: '客户付款',
          amount: inv.amount,
          currency: inv.currency || 'USD',
          customerId: inv.customerId,
          description: `账单收款: ${inv.description || '服务费'}`,
          date: inv.paidDate || new Date().toISOString().slice(0,10),
          linkedInvoiceId: inv.id
        }, true); // _skipSave — we save once below
      }
    }
    // Sync all linked transactions' amount/currency when editing a paid invoice
    if (oldStatus === 'paid' && cleanUpdates.status === 'paid' && (cleanUpdates.amount || cleanUpdates.currency)) {
      (this.data.transactions||[]).filter(t => t.linkedInvoiceId === id).forEach(linked => {
        if (cleanUpdates.amount != null) linked.amount = cleanUpdates.amount;
        if (cleanUpdates.currency) linked.currency = cleanUpdates.currency;
        linked.updatedAt = new Date().toISOString();
      });
    }
    // Remove linked transaction when invoice reverts from paid to other status
    if (oldStatus === 'paid' && cleanUpdates.status && cleanUpdates.status !== 'paid') {
      this.data.transactions = (this.data.transactions||[]).filter(
        t => !(t.linkedInvoiceId === id)
      );
    }
    this.save();
  },
  deleteInvoice(id) {
    // Also remove any linked transaction
    this.data.transactions = (this.data.transactions||[]).filter(
      t => !(t.linkedInvoiceId === id)
    );
    this.data.invoices = this.data.invoices.filter(x => x.id !== id);
    this.save();
  },

  // FixedCost CRUD
  addFixedCost(fc) {
    fc.id = 'fc_' + Date.now();
    fc.createdAt = new Date().toISOString();
    fc.updatedAt = new Date().toISOString();
    this.data.fixedCosts.push(fc);
    this.save();
  },
  updateFixedCost(id, updates) {
    const fc = (this.data.fixedCosts||[]).find(x => x.id === id);
    if (!fc) return;
    Object.assign(fc, updates, { updatedAt: new Date().toISOString() });
    this.save();
  },
  deleteFixedCost(id) {
    this.data.fixedCosts = (this.data.fixedCosts||[]).filter(x => x.id !== id);
    this.save();
  },

  getStats() {
    const cs = this.data.customers;
    const ts = this.data.tasks;
    const txns = this.data.transactions || [];
    const invs = this.data.invoices || [];
    const now = new Date();
    const weekAgo = new Date(now - 7*86400000);
    const stageCounts = {};
    STAGES.forEach(s => stageCounts[s] = 0);
    cs.forEach(c => { stageCounts[c.stage] = (stageCounts[c.stage]||0) + 1; });
    const today = now.toISOString().slice(0,10);
    const appointments = cs.filter(c => c.phoneAppointment && c.phoneAppointment.slice(0,10) === today);
    const overdue = ts.filter(t => t.dueDate && t.dueDate < today && t.status !== 'review' && t.status !== 'finish');
    const newThisWeek = cs.filter(c => new Date(c.createdAt) >= weekAgo).length;
    // Financial stats (multi-currency → USD)
    const totalIncome = txns.filter(t => t.type === 'income').reduce((s, t) => s + toUSD(t.amount, t.currency), 0);
    const totalExpense = txns.filter(t => t.type === 'expense').reduce((s, t) => s + toUSD(t.amount, t.currency), 0);
    const pendingInvoices = invs.filter(i => i.status === 'pending').reduce((s, i) => s + toUSD(i.amount, i.currency), 0);
    const overdueInvoices = invs.filter(i => i.status === 'overdue').reduce((s, i) => s + toUSD(i.amount, i.currency), 0);
    return {
      total: cs.length, stageCounts, appointments, overdue, newThisWeek,
      taskByStatus: TASK_STATUS.reduce((a,s)=>{a[s]=ts.filter(t=>t.status===s).length;return a},{}),
      totalIncome, totalExpense, profit: totalIncome - totalExpense,
      pendingInvoices, overdueInvoices
    };
  }
};

// ═══════════════════════════════════════════
// Section 3: jsonbin.io Adapter
// ═══════════════════════════════════════════
CRM.api = {
  MASTER_KEY: '$2a$10$rrgPsWpOrAxvSDxcFE9ZwuXN86bcZs1bozxCOQl1CracmhB/iqJIy',
  ACCESS_KEY: '$2a$10$FEg1GPK1vKxdk1DXMMLJsu1Id4dw5GHkgjhzYrAz.EmUSimEktHJq',
  BIN_ID: '69e647b336566621a8d28648',
  baseUrl: 'https://api.jsonbin.io/v3',

  async fetch() {
    try {
      const r = await fetch(`${this.baseUrl}/b/${this.BIN_ID}/latest`, {
        headers:{ 'X-Master-Key': this.MASTER_KEY, 'X-Access-Key': this.ACCESS_KEY }
      });
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j.record;
    } catch(e) { console.error('Fetch error:', e); return null; }
  },

  async push(data) {
    // Guard: never overwrite remote with empty arrays if we had data before
    const cached = localStorage.getItem('crm_cache');
    let prev = null;
    if (cached) {
      try { prev = JSON.parse(cached); } catch(e) {
        console.error('Cache parse failed, skipping empty guard:', e);
        localStorage.removeItem('crm_cache');
      }
    }
    if (prev) {
      const purged = (data.meta && data.meta._purged) || [];
      const guards = ['customers','tasks','transactions','invoices','fixedCosts'];
      guards.forEach(key => {
        if (purged.includes(key)) return; // User intentionally purged this data
        if ((prev[key]||[]).length > 0 && (data[key]||[]).length === 0) {
          console.error(`BLOCKED: attempted to push with empty ${key}.`);
          data[key] = prev[key];
        }
      });
    }
    const r = await fetch(`${this.baseUrl}/b/${this.BIN_ID}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': this.MASTER_KEY, 'X-Access-Key': this.ACCESS_KEY },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('Push failed: ' + r.status);
  }
};

// ═══════════════════════════════════════════
// Section 4: Customer Module
// ═══════════════════════════════════════════
CRM.data.customerColumns = () => STAGES;

CRM.data.renderCustomerCard = (c) => {
  const segClass = 'badge-' + c.segment.toLowerCase();
  const skipTexts = ['更新了客户信息', '阶段变更:', '阶段更正:'];
  let latestAct = '';
  for (const a of (c.activities||[])) {
    const t = a.text || '';
    if (t && !skipTexts.some(s => t.startsWith(s))) { latestAct = t; break; }
  }
  return `<div class="card" draggable="true" data-id="${c.id}" data-type="customer">
    <div class="card-left">
      <div class="card-title">${esc(c.company||c.name)}</div>
      <div class="card-meta">${esc(c.name)}${c.website?' · '+esc(c.website.replace(/^https?:\/\//,'').replace(/\/.*$/,'')):''}</div>
    </div>
    <div class="card-right">
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <span class="badge ${segClass}">${c.segment}类</span>
        ${(Array.isArray(c.services)?c.services:[c.services].filter(Boolean)).slice(0,1).map(s=>`<span class="badge" style="background:var(--blue-dim);color:var(--blue)">${esc(s)}</span>`).join('')}
      </div>
      ${latestAct ? `<span class="card-latest">${esc(latestAct)}</span>` : ''}
    </div>
  </div>`;
};

CRM.data.renderTaskCard = (t) => {
  const priColor = {high:'#dc2626',medium:'#f59e0b',low:'#22c55e'}[t.priority]||'#f59e0b';
  const priLabel = {high:'紧急',medium:'普通',low:'低'}[t.priority]||'普通';
  const cust = t.customerId ? CRM.state.getCustomer(t.customerId) : null;
  const dueStr = t.dueDate ? (t.dueDate < new Date().toISOString().slice(0,10) ? '⚠ '+t.dueDate : t.dueDate) : '';
  return `<div class="card" draggable="true" data-id="${t.id}" data-type="task">
    <div class="pri-dot" style="background:${priColor}"></div>
    <div class="card-main" style="min-width:0">
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        <span class="pri-tag" style="color:${priColor};border-color:${priColor}20">${esc(priLabel)}</span>
        ${cust ? `<span>${esc(cust.company||cust.name)}</span>` : ''}

      </div>
    </div>
  </div>`;
};

  // Accounting sub-tab state
  _acctSubtab: 'dashboard',

  // ═══════════════════════════════════════════
  // Cash Flow Health Dashboard
  // ═══════════════════════════════════════════
  _renderDashboard() {
    const txns = CRM.state.data.transactions || [];
    const invs = CRM.state.data.invoices || [];
    const fcs = CRM.state.data.fixedCosts || [];
    const now = new Date();
    const thisMonth = now.toISOString().slice(0,7);
    const lastMonth = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,7);

    // ── Basic totals (multi-currency → USD) ──
    const totalIncome = txns.filter(t=>t.type==='income').reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
    const totalExpense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
    const profit = totalIncome - totalExpense;
    const pendingAmt = invs.filter(i=>i.status==='pending').reduce((s,i)=>s+toUSD(i.amount,i.currency),0);
    const overdueAmt = invs.filter(i=>i.status==='overdue').reduce((s,i)=>s+toUSD(i.amount,i.currency),0);

    // ── Monthly fixed costs (multi-currency → USD) ──
    const monthlyFixed = fcs.reduce((s,fc) => {
      return s + toUSD(fc.period === 'yearly' ? (fc.amount||0)/12 : (fc.amount||0), fc.currency);
    }, 0);

    // ── This month income/expense (multi-currency) ──
    const monthIncome = txns.filter(t=>t.type==='income'&&(t.date||'').startsWith(thisMonth)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
    const monthExpense = txns.filter(t=>t.type==='expense'&&(t.date||'').startsWith(thisMonth)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
    const lastMonthIncome = txns.filter(t=>t.type==='income'&&(t.date||'').startsWith(lastMonth)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
    const lastMonthExpense = txns.filter(t=>t.type==='expense'&&(t.date||'').startsWith(lastMonth)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);

    // ── Daily cash flow (last 14 days, multi-currency) ──
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      const dayIn = txns.filter(t=>t.type==='income'&&t.date===ds).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
      const dayOut = txns.filter(t=>t.type==='expense'&&t.date===ds).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
      days.push({date:ds.slice(5), income:dayIn, expense:dayOut, net:dayIn-dayOut});
    }
    const maxDay = Math.max(...days.map(d=>Math.max(d.income,d.expense)),1);

    // ── MRR estimation (from invoices, multi-currency) ──
    const activeCusts = new Set(invs.filter(i=>i.status==='paid'||i.status==='pending').map(i=>i.customerId)).size;
    const paidInvs = invs.filter(i=>i.status==='paid');
    const avgDeal = paidInvs.length ? paidInvs.reduce((s,i)=>s+toUSD(i.amount,i.currency),0)/paidInvs.length : 0;
    const estimatedMRR = avgDeal * activeCusts;

    // ── Health score ──
    let healthScore = 50;
    if (profit > 0) healthScore += 15;
    if (profit > totalExpense * 0.3) healthScore += 10;
    if (monthIncome > monthExpense) healthScore += 10;
    if (overdueAmt === 0) healthScore += 5;
    if (monthIncome >= monthlyFixed) healthScore += 10;
    healthScore = Math.min(100, Math.max(0, healthScore));

    const healthColor = healthScore >= 80 ? 'var(--green)' : healthScore >= 50 ? 'var(--yellow)' : '#dc2626';
    const healthLabel = healthScore >= 80 ? '健康' : healthScore >= 50 ? '一般' : '危险';

    // ── Expense by category (multi-currency) ──
    const expByCat = {};
    txns.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+toUSD(t.amount,t.currency)});
    const sortedCats = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
    const maxCat = sortedCats[0]?.[1]||1;

    // ── Income by customer (multi-currency) ──
    const incByCust = {};
    txns.filter(t=>t.type==='income'&&t.customerId).forEach(t=>{
      const c = CRM.state.getCustomer(t.customerId);
      const name = c ? (c.company||c.name) : '其他';
      incByCust[name] = (incByCust[name]||0)+toUSD(t.amount,t.currency);
    });
    const sortedCusts = Object.entries(incByCust).sort((a,b)=>b[1]-a[1]);
    const maxCust = sortedCusts[0]?.[1]||1;

    const catColors = ['var(--accent)','#7c3aed','var(--blue)','#f59e0b','#06b6d4','#ec4899','var(--green)','#64748b'];
    const custColors = ['#7c3aed','var(--accent)','var(--blue)','var(--green)','#f59e0b','#06b6d4'];

    // ── Donut SVG ──
    const donutData = sortedCats.slice(0,6);
    const donutTotal = donutData.reduce((s,d)=>s+d[1],0) || 1;
    let cumPercent = 0;
    const donutSegments = donutData.map((d,i)=>{
      const pct = d[1]/donutTotal*100;
      const start = cumPercent; cumPercent += pct;
      return `<circle cx="50" cy="50" r="40" fill="none" stroke="${catColors[i%catColors.length]}" stroke-width="16" stroke-dasharray="${pct*2.513} ${251.3-pct*2.513}" stroke-dashoffset="${-start*2.513}" transform="rotate(-90 50 50)"/>`;
    }).join('');
    const donutLegend = donutData.map((d,i)=>`<span><span class="donut-dot" style="background:${catColors[i%catColors.length]}"></span>${d[0]} $${d[1]}</span>`).join('');

    // ── AR aging ──
    const today = now.toISOString().slice(0,10);
    const openInvs = invs.filter(i=>i.status==='pending'||i.status==='overdue');
    const threeDaysLater = new Date(now.getTime() + 3*86400000).toISOString().slice(0,10);
    const warningInvs = openInvs.filter(i=>i.dueDate && i.dueDate <= threeDaysLater);

    // ── MoM growth ──
    const incomeGrowth = lastMonthIncome > 0 ? ((monthIncome - lastMonthIncome)/lastMonthIncome*100).toFixed(0) : '—';
    const expenseGrowth = lastMonthExpense > 0 ? ((monthExpense - lastMonthExpense)/lastMonthExpense*100).toFixed(0) : '—';

    // ── Monthly trend (last 6 months) ──
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const md = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const mk = md.toISOString().slice(0,7);
      const mLabel = md.toLocaleString('zh-CN',{month:'short'});
      const mIn = txns.filter(t=>t.type==='income'&&(t.date||'').startsWith(mk)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
      const mOut = txns.filter(t=>t.type==='expense'&&(t.date||'').startsWith(mk)).reduce((s,t)=>s+toUSD(t.amount,t.currency),0);
      months.push({label:mLabel, key:mk, income:mIn, expense:mOut, profit:mIn-mOut});
    }
    const maxMonth = Math.max(...months.map(m=>Math.max(m.income,m.expense)),1);

    // ── Client profitability (revenue vs estimated cost) ──
    const custProfit = {};
    txns.filter(t=>t.customerId).forEach(t=>{
      if(!custProfit[t.customerId]) custProfit[t.customerId]={income:0,expense:0};
      if(t.type==='income') custProfit[t.customerId].income+=toUSD(t.amount,t.currency);
      else custProfit[t.customerId].expense+=toUSD(t.amount,t.currency);
    });
    const sortedProfit = Object.entries(custProfit).map(([cid,v])=>{
      const c=CRM.state.getCustomer(cid);
      return {name:c?(c.company||c.name):'?',income:v.income,expense:v.expense,profit:v.income-v.expense};
    }).sort((a,b)=>b.profit-a.profit);

    return `
    ${warningInvs.length ? `<div class="dash-card full" style="border-left:4px solid #f59e0b;background:#fffbeb">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">⚠️</span>
        <div style="font-size:13px;font-weight:600;color:#92400e">${warningInvs.length} 笔账单即将到期（3天内）或已逾期，合计 $${warningInvs.reduce((s,i)=>s+toUSD(i.amount,i.currency),0).toLocaleString()}</span>
      </div>
    </div>` : ''}

    <!-- Health Score Banner -->
    <div class="dash-card full" style="border-left:4px solid ${healthColor}">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">现金流健康度</div>
          <div class="dash-big" style="color:${healthColor}">${healthScore}<span style="font-size:16px;font-weight:400">/100</span></div>
          <div class="dash-sub">状态：${healthLabel}${profit>=0?' · 盈利中':' · 亏损中'}${monthIncome>=monthlyFixed?' · 收入覆盖固定成本':' · ⚠ 固定成本未覆盖'}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:12px;flex-wrap:wrap">
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--blue)">$${estimatedMRR.toFixed(0)}</div><div style="font-size:10px;color:var(--text3)">预估MRR</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green)">${activeCusts}</div><div style="font-size:10px;color:var(--text3)">活跃客户</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--yellow)">$${avgDeal.toFixed(0)}</div><div style="font-size:10px;color:var(--text3)">平均客单价</div></div>
        </div>
      </div>
    </div>

    <!-- 4 KPI Cards -->
    <div class="dash-grid" style="margin-bottom:16px">
      <div class="dash-card">
        <h3>本月收入</h3>
        <div class="dash-big positive">$${monthIncome.toLocaleString()}</div>
        <div class="dash-sub">环比 ${incomeGrowth !== '—' ? (incomeGrowth >= 0 ? '+' : '') + incomeGrowth + '%' : '—'}</div>
      </div>
      <div class="dash-card">
        <h3>本月支出</h3>
        <div class="dash-big negative">$${monthExpense.toLocaleString()}</div>
        <div class="dash-sub">环比 ${expenseGrowth !== '—' ? (expenseGrowth >= 0 ? '+' : '') + expenseGrowth + '%' : '—'}</div>
      </div>
      <div class="dash-card">
        <h3>本月净现金流</h3>
        <div class="dash-big ${(monthIncome-monthExpense)>=0?'positive':'negative'}">${(monthIncome-monthExpense)>=0?'+':''}$${(monthIncome-monthExpense).toLocaleString()}</div>
        <div class="dash-sub">利润率 ${monthIncome>0?Math.round((monthIncome-monthExpense)/monthIncome*100):0}%</div>
      </div>
      <div class="dash-card">
        <h3>应收账款</h3>
        <div class="dash-big neutral">$${(pendingAmt+overdueAmt).toLocaleString()}</div>
        <div class="dash-sub">待收 $${pendingAmt.toLocaleString()} · 逾期 $${overdueAmt.toLocaleString()}</div>
      </div>
    </div>

    <!-- Daily Cash Flow -->
    <div class="dash-card full">
      <h3>日现金流（近14天）</h3>
      <div style="display:flex;gap:2px;align-items:flex-end;height:100px;margin-top:8px">
        ${days.map(d=>{
          const inH = d.income/maxDay*80;
          const outH = d.expense/maxDay*80;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0" title="${d.date}: 收$${d.income} 支$${d.expense}">
            <div style="width:100%;max-width:14px;height:${Math.max(inH,1)}px;background:var(--green);border-radius:2px 2px 0 0;opacity:.7"></div>
            <div style="width:100%;max-width:14px;height:${Math.max(outH,1)}px;background:#ef4444;border-radius:0 0 2px 2px;opacity:.5"></div>
            <div style="font-size:8px;color:var(--text3);margin-top:2px;white-space:nowrap">${d.date}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text3)">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;vertical-align:middle;margin-right:4px"></span>收入</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px;vertical-align:middle;margin-right:4px;opacity:.5"></span>支出</span>
      </div>
    </div>

    <!-- Monthly Trend (6 months) -->
    <div class="dash-card full">
      <h3>月度趋势（近6个月）</h3>
      <div style="display:flex;gap:8px;align-items:flex-end;height:120px;margin-top:8px">
        ${months.map(m=>{
          const inH = m.income/maxMonth*90;
          const outH = m.expense/maxMonth*90;
          const isProfit = m.profit >= 0;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0" title="${m.key}: 收$${m.income.toFixed(0)} 支$${m.expense.toFixed(0)} 净${isProfit?'+':''}$${m.profit.toFixed(0)}">
            <div style="font-size:9px;font-weight:600;color:${isProfit?'var(--green)':'#ef4444'}">${isProfit?'+':''}$${m.profit.toFixed(0)}</div>
            <div style="display:flex;gap:1px;align-items:flex-end;height:90px">
              <div style="width:14px;height:${Math.max(inH,2)}px;background:var(--green);border-radius:2px 2px 0 0;opacity:.7"></div>
              <div style="width:14px;height:${Math.max(outH,2)}px;background:#ef4444;border-radius:2px 2px 0 0;opacity:.5"></div>
            </div>
            <div style="font-size:9px;color:var(--text3);margin-top:2px;white-space:nowrap">${m.label}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text3)">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;vertical-align:middle;margin-right:4px"></span>收入</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px;vertical-align:middle;margin-right:4px;opacity:.5"></span>支出</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--blue);border-radius:2px;vertical-align:middle;margin-right:4px"></span>净利润</span>
      </div>
    </div>

    <!-- Fixed Costs + Customer Revenue -->
    <div class="dash-grid">
      <div class="dash-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h3 style="margin:0">月度固定成本</h3>
          <button class="btn btn-ghost btn-sm" onclick="CRM.ui.openFixedCostForm()">+ 添加</button>
        </div>
        <div class="dash-big negative" style="margin-bottom:8px">$${monthlyFixed.toFixed(0)}<span style="font-size:14px;font-weight:400;color:var(--text3)">/月</span></div>
        <div class="bar-chart">
          ${fcs.length ? fcs.map(fc=>{
            const monthlyAmt = toUSD(fc.period === 'yearly' ? (fc.amount||0)/12 : (fc.amount||0), fc.currency);
            const pct = monthlyFixed > 0 ? monthlyAmt/monthlyFixed*100 : 0;
            return `<div class="bar-row" style="cursor:pointer" onclick="CRM.ui.openFixedCostForm(CRM.state.data.fixedCosts.find(x=>x.id==='${fc.id}'))">
              <span class="bar-label">${esc(fc.name)}</span>
              <div class="bar-track"><div class="bar-fill red" style="width:${pct}%">${pct>15?'$'+Math.round(monthlyAmt):''}</div></div>
              <span class="bar-val">$${Math.round(monthlyAmt)}/月</span>
            </div>`;
          }).join('') : '<div style="color:var(--text3);font-size:12px;padding:8px 0">暂未设置固定成本，点击"+ 添加"开始</div>'}
          ${fcs.length ? `<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-size:12px;color:var(--text2)">盈亏平衡点：月收入需 ≥ <strong>$${monthlyFixed.toFixed(0)}</strong></div>` : ''}
        </div>
      </div>

      <div class="dash-card">
        <h3>客户收入排行</h3>
        <div class="bar-chart">
          ${sortedCusts.length ? sortedCusts.slice(0,6).map((d,i)=>`
            <div class="bar-row">
              <span class="bar-label">${esc(d[0])}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${d[1]/maxCust*100}%;background:${custColors[i%custColors.length]}">$${d[1]}</div></div>
              <span class="bar-val">$${d[1]}</span>
            </div>
          `).join('') : '<div style="color:var(--text3);font-size:12px">暂无收入数据</div>'}
        </div>
      </div>

      <div class="dash-card">
        <h3>支出分类构成</h3>
        <div class="donut-wrap">
          <svg viewBox="0 0 100 100" width="100" height="100" class="donut-svg">${donutSegments}<circle cx="50" cy="50" r="32" fill="var(--surface)"/><text x="50" y="48" text-anchor="middle" font-size="10" font-weight="700" fill="var(--text)">$${totalExpense}</text><text x="50" y="60" text-anchor="middle" font-size="7" fill="var(--text3)">总支出</text></svg>
          <div class="donut-legend">${donutLegend || '<span style="color:var(--text3)">暂无数据</span>'}</div>
        </div>
      </div>

      <div class="dash-card">
        <h3>待收款明细</h3>
        <div class="bar-chart">
          ${openInvs.length ? openInvs.map(inv=>{
            const c = inv.customerId ? CRM.state.getCustomer(inv.customerId) : null;
            const isOverdue = inv.status==='overdue' || (inv.dueDate && inv.dueDate < today && inv.status==='pending');
            const isWarning = !isOverdue && inv.dueDate && inv.dueDate <= threeDaysLater;
            return `<div class="bar-row" style="cursor:pointer${isWarning?';background:#fffbeb':''}" onclick="CRM.ui.openInvoiceForm(CRM.state.data.invoices.find(x=>x.id==='${inv.id}'))">
              <span class="bar-label">${c?esc(c.company||c.name):'?'}</span>
              <span class="inv-status ${isOverdue?'overdue':isWarning?'pending':''}">${isOverdue?'逾期':isWarning?'⚠ 即将到期':'待收'}</span>
              <span style="flex:1"></span>
              <span style="font-size:13px;font-weight:700;color:var(--accent)">$${toUSD(inv.amount||0,inv.currency).toLocaleString()}</span>
            </div>`;
          }).join('') : '<div style="color:var(--text3);font-size:12px">全部收齐</div>'}
        </div>
      </div>

      <!-- Client Profitability -->
      <div class="dash-card">
        <h3>客户盈利分析</h3>
        <div class="bar-chart">
          ${sortedProfit.length ? sortedProfit.slice(0,8).map(d=>{
            const maxP = Math.max(...sortedProfit.map(x=>Math.max(x.income,x.expense)),1);
            const barW = Math.abs(d.profit)/maxP*100;
            const color = d.profit >= 0 ? 'var(--green)' : '#ef4444';
            return `<div class="bar-row">
              <span class="bar-label">${esc(d.name)}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${color}">${d.profit>=0?'+':''}$${d.profit.toFixed(0)}</div></div>
              <span class="bar-val" style="color:${color}">${d.profit>=0?'+':''}$${d.profit.toFixed(0)}</span>
            </div>`;
          }).join('') : '<div style="color:var(--text3);font-size:12px">暂无数据</div>'}
          ${sortedProfit.length ? `<div style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px;font-size:11px;color:var(--text3)">收入 - 关联支出 = 净贡献</div>` : ''}
        </div>
      </div>
    </div>`;
  },

  // Transaction Form
  openTransactionForm(existing) {
    const t = existing || { type:'income', category:'', amount:'', currency:'USD', customerId:'', description:'', date: new Date().toISOString().slice(0,10) };
    const isEdit = !!existing;
    const custs = CRM.state.data.customers;
    const cats = t.type === 'income' ? TXN_CATEGORIES_INCOME : TXN_CATEGORIES_EXPENSE;
    document.getElementById('modalContent').innerHTML = `
      <h2>${isEdit?'编辑':'添加'}收支</h2>
      <div class="modal-grid">
        <div class="field"><label>类型</label><select id="atf_type" onchange="CRM.ui._updateTxCategories()">
          <option value="income" ${t.type==='income'?'selected':''}>收入</option>
          <option value="expense" ${t.type==='expense'?'selected':''}>支出</option>
        </select></div>
        <div class="field"><label>分类</label><select id="atf_cat">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>金额</label><input id="atf_amount" type="number" step="0.01" value="${t.amount||''}"></div>
        <div class="field"><label>币种</label><select id="atf_currency">${CURRENCIES.map(c=>`<option ${t.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>日期</label><input id="atf_date" type="date" value="${(t.date||'').slice(0,10)}"></div>
        <div class="field"><label>关联客户</label><select id="atf_cust"><option value="">-- 无 --</option>${custs.map(c=>`<option value="${c.id}" ${t.customerId===c.id?'selected':''}>${esc(c.company||c.name)}</option>`).join('')}</select></div>
        <div class="field full"><label>说明</label><input id="atf_desc" value="${esc(t.description)}" placeholder="简要说明"></div>
      </div>
      <div class="modal-actions">
        ${isEdit?`<button class="btn btn-ghost" style="color:#ef4444;margin-right:auto" onclick="if(confirm('确认删除?')){CRM.state.deleteTransaction('${t.id}');CRM.ui.closeModal()}">删除</button>`:''}
        <button class="btn btn-ghost" onclick="CRM.ui.closeModal()">取消</button>
        <button class="btn btn-accent" onclick="CRM.ui.saveTransaction('${t.id||''}')">保存</button>
      </div>`;
    this.openModal();
  },

  _updateTxCategories() {
    const type = document.getElementById('atf_type').value;
    const cats = type === 'income' ? TXN_CATEGORIES_INCOME : TXN_CATEGORIES_EXPENSE;
    document.getElementById('atf_cat').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  },

  saveTransaction(id) {
    const d = {
      type: document.getElementById('atf_type').value,
      category: document.getElementById('atf_cat').value,
      amount: parseFloat(document.getElementById('atf_amount').value) || 0,
      currency: document.getElementById('atf_currency').value,
      customerId: document.getElementById('atf_cust').value,
      description: document.getElementById('atf_desc').value.trim(),
      date: document.getElementById('atf_date').value
    };
    if (!d.amount) return alert('请填写金额');
    // Duplicate detection: same customer + same amount + same date + same type
    if (!id) {
      const dup = (CRM.state.data.transactions||[]).find(t =>
        t.type === d.type &&
        t.customerId === d.customerId &&
        Math.abs(toUSD(t.amount, t.currency) - toUSD(d.amount, d.currency)) < 1 &&
        t.date === d.date
      );
      if (dup) {
        const custName = d.customerId ? (CRM.state.getCustomer(d.customerId)?.company || CRM.state.getCustomer(d.customerId)?.name) : '';
        if (!confirm(`疑似重复记账！\n\n已存在：${custName || '无客户'} ${d.type==='income'?'收入':'支出'} ${CURRENCY_SYMBOLS[d.currency]||'$'}${d.amount} (${d.date})\n\n仍要继续？`)) return;
      }
    }
    if (id) CRM.state.updateTransaction(id, d);
    else CRM.state.addTransaction(d);
    this.closeModal();
  },

  // Invoice Form
  openInvoiceForm(existing) {
    const inv = existing || { customerId:'', amount:'', currency:'USD', status:'pending', dueDate:'', description:'' };
    const isEdit = !!existing;
    const custs = CRM.state.data.customers;
    document.getElementById('modalContent').innerHTML = `
      <h2>${isEdit?'编辑':'添加'}账单</h2>
      <div class="modal-grid">
        <div class="field"><label>客户</label><select id="aif_cust">${custs.map(c=>`<option value="${c.id}" ${inv.customerId===c.id?'selected':''}>${esc(c.company||c.name)}</option>`).join('')}</select></div>
        <div class="field"><label>金额</label><input id="aif_amount" type="number" step="0.01" value="${inv.amount||''}"></div>
        <div class="field"><label>币种</label><select id="aif_currency">${CURRENCIES.map(c=>`<option ${inv.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>状态</label><select id="aif_status">${INV_STATUS.map(s=>`<option value="${s}" ${inv.status===s?'selected':''}>${INV_LABELS[s]}</option>`).join('')}</select></div>
        <div class="field"><label>到期日</label><input id="aif_due" type="date" value="${(inv.dueDate||'').slice(0,10)}"></div>
        <div class="field"><label>收款日</label><input id="aif_paid" type="date" value="${(inv.paidDate||'').slice(0,10)}"></div>
        <div class="field full"><label>说明</label><input id="aif_desc" value="${esc(inv.description)}" placeholder="服务内容"></div>
      </div>
      <div class="modal-actions">
        ${isEdit?`<button class="btn btn-ghost" style="color:#ef4444;margin-right:auto" onclick="if(confirm('确认删除?')){CRM.state.deleteInvoice('${inv.id}');CRM.ui.closeModal()}">删除</button>`:''}
        <button class="btn btn-ghost" onclick="CRM.ui.closeModal()">取消</button>
        <button class="btn btn-accent" onclick="CRM.ui.saveInvoice('${inv.id||''}')">保存</button>
      </div>`;
    this.openModal();
  },

  saveInvoice(id) {
    const d = {
      customerId: document.getElementById('aif_cust').value,
      amount: parseFloat(document.getElementById('aif_amount').value) || 0,
      currency: document.getElementById('aif_currency').value,
      status: document.getElementById('aif_status').value,
      dueDate: document.getElementById('aif_due').value,
      paidDate: document.getElementById('aif_paid').value || null,
      description: document.getElementById('aif_desc').value.trim()
    };
    if (!d.amount) return alert('请填写金额');
    if (id) CRM.state.updateInvoice(id, d);
    else CRM.state.addInvoice(d);
    this.closeModal();
  },

  // Fixed Cost Form
  openFixedCostForm(existing) {
    const fc = existing || { name:'', category:'服务器/VPS', amount:'', currency:'USD', period:'monthly' };
    const isEdit = !!existing;
    document.getElementById('modalContent').innerHTML = `

  // Touch drag for mobile — Trello-level
  _initTouchDrag() {
    const LONG_PRESS_MS = 250;
    const MOVE_CANCEL_PX = 8;
    const EDGE_ZONE = 60;
    const EDGE_SPEED = 10;
    let td = this._touchDrag;
    let longPressTimer = null;
    let autoScrollInterval = null;
    let pinchScale = 1;
    let pinchStartDist = 0;

    const getDist = (t1, t2) => Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);

    const stopAutoScroll = () => {
      if (autoScrollInterval) { clearInterval(autoScrollInterval); autoScrollInterval = null; }
    };

    const cleanup = () => {
      clearTimeout(longPressTimer); longPressTimer = null;
      stopAutoScroll();
      if (td.card) { td.card.classList.remove('touch-dragging','long-pressing'); }
      if (td.ghost) { td.ghost.remove(); }
      document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      td.active = false; td.card = null; td.ghost = null; td.id = null; td.type = null;
    };

    // ── Pinch zoom ──
    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        cleanup();
        pinchStartDist = getDist(e.touches[0], e.touches[1]);
      }
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && pinchStartDist > 0) {
        e.preventDefault();
        const dist = getDist(e.touches[0], e.touches[1]);
        const ratio = dist / pinchStartDist;
        pinchScale = Math.min(2, Math.max(0.5, pinchScale * ratio));
        pinchStartDist = dist;
        const kb = document.getElementById('kanban');
        kb.style.transform = `scale(${pinchScale})`;
        kb.style.transformOrigin = '0 0';
        kb.parentElement.style.overflow = pinchScale > 1 ? 'auto' : 'hidden';
        return;
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.touches.length < 2) pinchStartDist = 0;
    });

    // Double-tap to reset zoom
    let lastTap = 0;
    document.getElementById('kanban')?.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300 && pinchScale !== 1) {
        pinchScale = 1;
        const kb = document.getElementById('kanban');
        kb.style.transform = 'scale(1)';
        kb.parentElement.style.overflow = 'hidden';
      }
      lastTap = now;
    });

    // ── Long-press drag ──
    document.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      const card = e.target.closest('.card');
      if (!card || e.target.closest('button,input,a,select,textarea')) return;
      const touch = e.touches[0];
      const rect = card.getBoundingClientRect();

      td.startX = touch.clientX;
      td.startY = touch.clientY;

      longPressTimer = setTimeout(() => {
        td.active = true;
        td.card = card;
        td.id = card.dataset.id;
        td.type = card.dataset.type;
        td.ghost = null;
        td.offsetX = touch.clientX - rect.left;
        td.offsetY = touch.clientY - rect.top;
        td.cardWidth = rect.width;
        td.cardHeight = rect.height;
        card.classList.add('touch-dragging');
        card.classList.add('long-pressing');
        setTimeout(() => card.classList.remove('long-pressing'), 150);
        if (navigator.vibrate) navigator.vibrate(30);
      }, LONG_PRESS_MS);
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      // Cancel long-press if moved too much before activation
      if (longPressTimer && !td.active) {
        const touch = e.touches[0];
        const dx = Math.abs(touch.clientX - td.startX);
        const dy = Math.abs(touch.clientY - td.startY);
        if (dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
        return;
      }

      if (!td.active) return;
      e.preventDefault();
      const touch = e.touches[0];
      const x = touch.clientX - td.offsetX;
      const y = touch.clientY - td.offsetY;

      // Create ghost on first move
      if (!td.ghost) {
        const g = document.createElement('div');
        g.className = 'drag-ghost';
        g.innerHTML = td.card.innerHTML;
        g.style.width = td.cardWidth + 'px';
        g.style.left = x + 'px';
        g.style.top = (y - 50) + 'px';
        document.body.appendChild(g);
        td.ghost = g;
        // Trigger appear animation
        requestAnimationFrame(() => g.classList.add('visible'));
      }

      td.ghost.style.left = x + 'px';
      td.ghost.style.top = (y - 50) + 'px';

      // Hide ghost for elementFromPoint, find column
      td.ghost.style.display = 'none';
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      td.ghost.style.display = '';

      const col = elemBelow?.closest('.column');
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      if (col) {
        col.classList.add('drag-over');
        const body = col.querySelector('.col-body');
        if (body) {
          const cards = [...body.querySelectorAll('.card:not(.touch-dragging)')];
          body.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
          let inserted = false;
          for (const c of cards) {
            if (touch.clientY < c.getBoundingClientRect().top + c.offsetHeight / 2) {
              const ph = document.createElement('div');
              ph.className = 'drag-placeholder';
              c.parentElement.insertBefore(ph, c);
              inserted = true;
              break;
            }
          }
          if (!inserted) {
            const ph = document.createElement('div');
            ph.className = 'drag-placeholder';
            body.appendChild(ph);
          }
        }
      }

      // Auto-scroll kanban near edges
      const kb = document.getElementById('kanban');
      const vw = window.innerWidth;
      stopAutoScroll();
      if (touch.clientX < EDGE_ZONE || touch.clientX > vw - EDGE_ZONE) {
        const dir = touch.clientX < EDGE_ZONE ? -1 : 1;
        const speed = Math.round(EDGE_SPEED * (1 - Math.min(touch.clientX, vw - touch.clientX) / EDGE_ZONE));
        autoScrollInterval = setInterval(() => {
          kb.scrollLeft += dir * Math.max(speed, 3);
        }, 16);
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (!td.active) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        return;
      }
      const touch = e.changedTouches[0];

      // Find drop target
      if (td.ghost) td.ghost.style.display = 'none';
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      if (td.ghost) td.ghost.style.display = '';

      const col = elemBelow?.closest('.column');
      if (col && td.id) {
        const newStage = col.dataset.stage;
        if (newStage) {
          if (td.type === 'customer') CRM.state.updateCustomer(td.id, { stage: newStage });
          else CRM.state.updateTask(td.id, { status: newStage });
        }
      }
      cleanup();
    });
  },

      contact: document.getElementById('f_contact').value.trim(),

      notes: document.getElementById('f_notes').value.trim()
    };
    if (!d.name && !d.company) return alert('至少填写联系人或公司名');

      const c = CRM.state.getCustomer(id);

        c.activities.unshift({ id: 'act_' + Date.now(), date: new Date().toISOString(), text: `阶段变更: ${oldStage} → ${d.stage}` });
      }
      c.activities.unshift({ id: 'act_' + (Date.now() + 1), date: new Date().toISOString(), text: '更新了客户信息' });
      CRM.state.save();
    } else {
      CRM.state.addCustomer(d);
    }
    this.closeModal();
  },

  addActivityPrompt(custId) {
    const text = prompt('添加活动记录:');

      this.openCustomerDetail(custId);

  editActivity(custId, actId) {
    const c = CRM.state.getCustomer(custId);
    if (!c || !c.activities) return;
    const act = c.activities.find(a => a.id === actId);
    if (!act) return;
    const newText = prompt('编辑活动记录:', act.text);
    if (newText !== null && newText.trim()) {
      act.text = newText.trim();
      c.updatedAt = new Date().toISOString();
      CRM.state.save();
      this.openCustomerDetail(custId);
    }
  },

  deleteActivity(custId, actId) {
    const c = CRM.state.getCustomer(custId);
    if (!c || !c.activities) return;
    const idx = c.activities.findIndex(a => a.id === actId);
    if (idx === -1) return;
    if (confirm('确认删除该活动记录？')) {
      c.activities.splice(idx, 1);
      c.updatedAt = new Date().toISOString();
      CRM.state.save();
      this.openCustomerDetail(custId);
    }
  },

        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn ${isSwipe?'btn-accent':'btn-ghost'}" onclick="CRM.ui.setMobileMode('swipe')">横滑拖拽</button>
          <button class="btn ${!isSwipe?'btn-accent':'btn-ghost'}" onclick="CRM.ui.setMobileMode('accordion')">手风琴</button>
        </div>
        <p style="font-size:11px;color:var(--text3)">横滑：左右滑动切换列，长按拖拽卡片。手风琴：上下展开折叠，底部导航栏。</p>
      </div>
      <div class="settings-section">
        <h3>数据管理</h3>
        <p>数据通过 jsonbin.io 自动同步。</p>
        <button class="btn btn-ghost" onclick="CRM.ui.exportJSON()" style="margin-right:8px">导出 JSON</button>
        <button class="btn btn-ghost" onclick="CRM.ui.openImportGuide()">导入 JSON</button>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="CRM.ui.closeModal()">关闭</button></div>`;
    this.openModal();
  },

  setMobileMode(mode) {
    localStorage.setItem('crm_mobile_mode', mode);
    if (mode === 'accordion') document.body.classList.add('mode-accordion');
    else document.body.classList.remove('mode-accordion');
    this.openSettings();
  },

  saveSettings() {
    this.closeModal();
    CRM.state.load();
  },

  // Export / Import
  exportJSON() {
    const blob = new Blob([JSON.stringify(CRM.state.data, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `crm-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  },

  importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.customers || !Array.isArray(data.customers)) throw new Error('Invalid format: missing customers');
        // Ensure all array fields exist
        ['tasks','transactions','invoices','fixedCosts'].forEach(key => {
          if (!Array.isArray(data[key])) data[key] = [];
        });
        if (!data.meta) data.meta = { lastUpdated: new Date().toISOString() };
        const existingC = CRM.state.data.customers.length;
        const existingT = CRM.state.data.tasks.length;
        if (!confirm(`⚠️ 导入会覆盖当前全部数据！\n\n当前：${existingC} 个客户、${existingT} 个任务\n导入：${data.customers.length} 个客户、${data.tasks?.length||0} 个任务\n\n如果是追加，建议先"导出"当前数据，合并后再导入。\n\n确认覆盖导入？`)) {
          e.target.value = '';
          return;
        }
        CRM.state.data = data;
        CRM.state.save();
      } catch(err) { alert('导入失败: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  },

  // Notifications
  checkAppointments() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') Notification.requestPermission();
    const now = new Date();
    CRM.state.data.customers.forEach(c => {
      if (!c.phoneAppointment) return;
      const apt = new Date(c.phoneAppointment);
      const diff = apt - now;
      if (diff > 0 && diff < 30*60*1000) {
        if (Notification.permission === 'granted') {
          new Notification(`📞 电话预约提醒`, { body: `${c.company||c.name} — ${apt.toLocaleTimeString('zh-CN')}`, tag: c.id });
        }
      }
    });
  },

  // Sync status
  updateSyncStatus() {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.className = 'sync-status ' + (CRM.state.syncStatus==='synced'?'':'unsynced');
    el.textContent = CRM.state.syncStatus==='synced'?'✓ 已同步':CRM.state.syncStatus==='unsynced'?'● 未同步':'✗ 同步失败';
  },

  openModal() { document.getElementById('modalOverlay').classList.add('open'); },
  closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
};

// ═══════════════════════════════════════════
// Section 7: Init
// ═══════════════════════════════════════════
function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    CRM.state.currentView = tab.dataset.view;
    CRM.state.searchQuery = '';
    CRM.ui.render();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') CRM.ui.closeModal();
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.querySelector('.kanban-toolbar input')?.focus(); }
});

// Init mobile mode from localStorage
if (localStorage.getItem('crm_mobile_mode') === 'accordion') {
  document.body.classList.add('mode-accordion');
}

// Re-render on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => CRM.ui.render(), 150);
});

// Mobile bottom nav handlers (accordion mode)
document.querySelectorAll('.mobile-nav .nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const action = item.dataset.action;
    if (action === 'settings') {
      document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
      item.classList.add('active');
      CRM.ui.openSettings();
      return;
    }
    document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.topbar .tab').forEach(t=>t.classList.remove('active'));
    item.classList.add('active');
    const tab = document.querySelector(`.topbar .tab[data-view="${item.dataset.view}"]`);
    if (tab) tab.classList.add('active');
    CRM.state.currentView = item.dataset.view;
    CRM.state.searchQuery = '';
    CRM.ui.render();
  });
});

// Sync topbar tab clicks with mobile nav
document.querySelectorAll('.topbar .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const view = tab.dataset.view;
    if (!view) return;
    document.querySelectorAll('.mobile-nav .nav-item').forEach(n=>n.classList.remove('active'));
    const navItem = document.querySelector(`.mobile-nav .nav-item[data-view="${view}"]`);
    if (navItem) navItem.classList.add('active');
  });
});

setInterval(() => CRM.ui.checkAppointments(), 300000);

CRM.state.load();
CRM.ui._initTouchDrag();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/crm/sw.js').catch(()=>{});
</script>
</body>
</html>
