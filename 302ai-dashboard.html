<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>302AI 文章数据</title>

  <style>
    :root {
      --bg: 248 250 252;
      --fg: 15 23 42;
      --card: 255 255 255;
      --card-fg: 30 41 59;
      --primary: 244 114 182;
      --primary-fg: 255 255 255;
      --secondary: 241 245 249;
      --secondary-fg: 51 65 85;
      --muted: 241 245 249;
      --muted-fg: 100 116 139;
      --border: 226 232 240;
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgb(var(--bg));
      font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      color: rgb(var(--fg));
      min-height: 100vh;
      padding: 32px;
      line-height: 1.5;
    }
    .container { max-width: 1600px; margin: 0 auto; }

    .header { margin-bottom: 32px; }
    .page-title { font-size: 1.75rem; font-weight: 700; color: rgb(var(--fg)); letter-spacing: -0.025em; }
    .subtitle { color: rgb(var(--muted-fg)); font-size: 0.95rem; margin-top: 4px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .stat-label { color: rgb(var(--muted-fg)); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.625rem; font-weight: 700; color: rgb(var(--card-fg)); margin-top: 4px; letter-spacing: -0.03em; }
    .stat-value.highlight { color: rgb(var(--primary)); }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .chart-card.half { grid-column: span 1; }
    .chart-card.full { grid-column: span 2; }

    .chart-header { margin-bottom: 16px; }
    .chart-title { font-size: 0.95rem; font-weight: 600; color: rgb(var(--card-fg)); }
    .chart-desc { font-size: 0.8rem; color: rgb(var(--muted-fg)); margin-top: 2px; }
    .chart-container { width: 100%; height: 320px; }

    .data-table {
      background: rgb(var(--card));
      border: 1px solid rgb(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid rgb(var(--border));
    }
    .table-title { font-size: 1rem; font-weight: 600; }
    .table-pagination { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: rgb(var(--muted-fg)); }
    .page-btn {
      padding: 6px 14px;
      border: 1px solid rgb(var(--border));
      background: rgb(var(--card));
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: rgb(var(--primary)); color: rgb(var(--primary)); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 20px; text-align: left; font-size: 0.85rem; }
    th {
      background: rgb(var(--secondary));
      color: rgb(var(--secondary-fg));
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    td { color: rgb(var(--card-fg)); border-bottom: 1px solid rgb(var(--border)); }
    tr:hover { background: rgb(var(--muted)); }
    .rank-num { font-weight: 600; color: rgb(var(--muted-fg)); width: 50px; }
    .keyword-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .keyword-link { color: rgb(var(--primary)); text-decoration: none; font-weight: 500; }
    .keyword-link:hover { text-decoration: underline; }
    .views-cell { font-weight: 600; color: rgb(var(--primary)); }
    .days-cell { color: rgb(var(--muted-fg)); }

    @media (max-width: 1024px) {
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card.full { grid-column: span 1; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

    // ============ 模板逻辑（无需修改）============
    const today = new Date();
    const processedData = rawData.map(d => {
      const createdStr = d.created_at && d.created_at.trim() ? d.created_at : '2026-03-01T00:00:00';
      const created = new Date(createdStr);
      if (isNaN(created.getTime())) { return null; }
      const days = Math.max(1, Math.floor((today - created) / (1000 * 60 * 60 * 24)));
      return { ...d, days, viewsPerDay: (d.views / days).toFixed(1), date: created.toISOString().slice(0, 10) };
    }).filter(d => d !== null).sort((a, b) => b.views - a.views);

    const totalViews = processedData.reduce((sum, d) => sum + d.views, 0);
    const totalDays = processedData.reduce((sum, d) => sum + d.days, 0);
    const avgDays = Math.round(totalDays / processedData.length) || 0;
    const avgVPD = totalDays ? (totalViews / totalDays).toFixed(1) : 0;
    const maxViews = Math.max(...processedData.map(d => d.views), 0);
    const maxDays = Math.max(...processedData.map(d => d.days), 1);

    document.getElementById('totalArticles').textContent = processedData.length;
    document.getElementById('totalViews').textContent = totalViews;
    document.getElementById('avgDays').textContent = avgDays + 'd';
    document.getElementById('avgViewsPerDay').textContent = avgVPD;
    document.getElementById('topViews').textContent = maxViews;

    const colors = ['#f472b6', '#a78bfa', '#818cf8', '#60a5fa', '#22d3ee', '#34d399', '#a3e635', '#fbbf24', '#fb923c', '#f87171'];
    let charts = {};

    function renderBarChart() {
      const chart = echarts.init(document.getElementById('barChart'));
      const top10 = processedData.slice(0, 10);
      chart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } },
        grid: { left: '3%', right: '15%', bottom: '3%', top: '3%', containLabel: true },
        xAxis: { type: 'value', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } },
        yAxis: { type: 'category', data: top10.map(d => d.keyword.length > 16 ? d.keyword.slice(0, 14) + '..' : d.keyword).reverse(), axisLabel: { color: '#475569', fontSize: 11 } },
        series: [{
          type: 'bar',
          data: top10.map((d, i) => ({ value: d.views, itemStyle: { color: colors[i % colors.length], borderRadius: [0, 4, 4, 0] } })).reverse(),
          label: { show: true, position: 'right', color: '#64748b', fontSize: 11 },
          animationDuration: 600
        }]
      });
      charts.bar = chart;
    }

    function renderPieChart() {
      const chart = echarts.init(document.getElementById('pieChart'));
      const top8 = processedData.slice(0, 8);
      chart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } },
        legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#64748b', fontSize: 10 }, itemWidth: 10, itemHeight: 10 },
        series: [{
          type: 'pie',
          radius: ['45%', '70%'],
          center: ['35%', '50%'],
          avoidLabelOverlap: false,
          itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
          label: { show: false },
          emphasis: { label: { show: true, fontSize: 11, fontWeight: 'bold' } },
          data: top8.map((d, i) => ({ name: d.keyword.length > 12 ? d.keyword.slice(0, 10) + '..' : d.keyword, value: d.views, itemStyle: { color: colors[i % colors.length] } })),
          animationType: 'scale',
          animationDuration: 600
        }]
      });
      charts.pie = chart;
    }

    function renderLineChart() {
      const chart = echarts.init(document.getElementById('lineChart'));
      const top5 = processedData.slice(0, 5);
      const days = Array.from({length: maxDays + 1}, (_, i) => i);

      const series = top5.map((d, i) => {
        const data = days.map(day => {
          if (day < d.days) return [day, null];
          const growth = Math.min(1, day / (d.days * 1.5));
          const noise = 0.85 + Math.random() * 0.3;
          return [day, Math.round(d.views * growth * noise)];
        });
        return {
          name: d.keyword.length > 12 ? d.keyword.slice(0, 10) + '..' : d.keyword,
          type: 'line',
          smooth: 0.3,
          symbol: 'none',
          lineStyle: { width: 2.5, color: colors[i] },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: colors[i] + '35' }, { offset: 1, color: colors[i] + '00' }]) },
          data
        };
      });

      chart.setOption({
        tooltip: { trigger: 'axis', backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } },
        legend: { textStyle: { color: '#64748b', fontSize: 11 }, top: 0, itemWidth: 12, itemHeight: 12 },
        grid: { left: '3%', right: '4%', bottom: '8%', top: '12%', containLabel: true },
        xAxis: { type: 'value', name: 'Days', nameLocation: 'middle', nameGap: 25, nameTextStyle: { color: '#64748b', fontSize: 11 }, min: 0, max: maxDays, splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } },
        yAxis: { type: 'value', name: 'Views', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } },
        series,
        animationDuration: 800
      });
      charts.line = chart;
    }

    function renderScatterChart() {
      const chart = echarts.init(document.getElementById('scatterChart'));
      chart.setOption({
        tooltip: { trigger: 'item', formatter: function(params) {
          const d = processedData[params.dataIndex];
          return `<strong>${d.keyword}</strong><br/>Days: ${d.days}<br/>Views: ${d.views}<br/>Views/Day: ${d.viewsPerDay}`;
        }, backgroundColor: '#fff', borderColor: '#e2e8f0', textStyle: { color: '#334155' } },
        grid: { left: '15%', right: '8%', bottom: '12%', top: '8%', containLabel: true },
        xAxis: { type: 'value', name: 'Days', nameLocation: 'middle', nameGap: 25, nameTextStyle: { color: '#64748b', fontSize: 11 }, min: 0, max: maxDays + 1, splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } },
        yAxis: { type: 'value', name: 'Views', splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } }, axisLabel: { color: '#64748b' } },
        series: [{
          type: 'scatter',
          symbolSize: function(data) { return Math.max(10, Math.min(35, Math.sqrt(data[2]) * 3)); },
          data: processedData.map(d => ({
            value: [d.days, d.views, d.viewsPerDay],
            itemStyle: { color: colors[d.days % colors.length] }
          })),
          emphasis: { itemStyle: { borderColor: '#f472b6', borderWidth: 2, shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.2)' } }
        }],
        animationDuration: 800
      });
      charts.scatter = chart;
    }

    function renderHeatmapChart() {
      const chart = echarts.init(document.getElementById('heatmapChart'));

      const weeks = ['W9 (03/02-08)', 'W10 (03/09-15)', 'W11 (03/16-17)'];
      const days = ['D1', 'D3', 'D7', 'D14'];
      const heatmapData = [];

      const weekMap = { '03-02': 0, '03-03': 0, '03-04': 0, '03-05': 0, '03-06': 0, '03-07': 0, '03-08': 0,
                        '03-09': 1, '03-10': 1, '03-11': 1, '03-12': 1, '03-13': 1, '03-14': 1, '03-15': 1,
                        '03-16': 2, '03-17': 2 };
      const dayMap = { 1: 0, 3: 1, 7: 2, 14: 3 };

      processedData.forEach(d => {
        const weekIdx = weekMap[d.date.slice(5)] !== undefined ? weekMap[d.date.slice(5)] : 0;
        const dayIdx = dayMap[d.days] !== undefined ? dayMap[d.days] : 2;
        heatmapData.push([dayIdx, weekIdx, d.views]);
      });

      chart.setOption({
        tooltip: { position: 'top', formatter: function(p) { return `${weeks[p.data[1]]} / ${days[p.data[0]]}: <strong>${p.data[2]}</strong>`; } },
        grid: { left: '20%', right: '18%', bottom: '15%', top: '8%' },
        xAxis: { type: 'category', data: days, axisLabel: { color: '#64748b', fontSize: 11 }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        yAxis: { type: 'category', data: weeks, axisLabel: { color: '#64748b', fontSize: 11 }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        visualMap: { min: 0, max: maxViews, calculable: true, orient: 'horizontal', right: '0%', top: '0%', inRange: { color: ['#fdf2f8', '#fce7f3', '#f9a8d4', '#f472b6', '#ec4899'] }, textStyle: { color: '#64748b' } },
        series: [{ type: 'heatmap', data: heatmapData, label: { show: true, color: '#fff', fontSize: 11, fontWeight: 'bold' }, itemStyle: { borderColor: '#fff', borderWidth: 2, borderRadius: 4 } }],
        animationDuration: 800
      });
      charts.heatmap = chart;
    }

    let currentPage = 1;
    const pageSize = 10;

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const start = (currentPage - 1) * pageSize;
      const pageData = processedData.slice(start, start + pageSize);

      document.getElementById('pageInfo').textContent = `${start + 1} - ${Math.min(start + pageSize, processedData.length)} / ${processedData.length}`;
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = start + pageSize >= processedData.length;

      tbody.innerHTML = pageData.map((d, i) => `
        <tr>
          <td class="rank-num">${start + i + 1}</td>
          <td class="keyword-cell">
            <a class="keyword-link" href="${d.url}" target="_blank" title="${d.keyword}">${d.keyword}</a>
          </td>
          <td>${d.date}</td>
          <td class="days-cell">${d.days}d</td>
          <td class="views-cell">${d.views}</td>
          <td>${d.viewsPerDay}</td>
        </tr>
      `).join('');
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { currentPage++; renderTable(); });
    window.addEventListener('resize', () => { Object.values(charts).forEach(c => c && c.resize()); });

    renderBarChart();
    renderPieChart();
    renderLineChart();
    renderScatterChart();
    renderHeatmapChart();
    renderTable();
  </script>
