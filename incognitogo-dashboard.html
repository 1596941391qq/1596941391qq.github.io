<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>IncognitoGo 阶梯测试面板</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    :root {
      --bg: 248 250 252; --fg: 15 23 42; --card: 255 255 255; --card-fg: 30 41 59;
      --primary: 59 130 246; --success: 34 197 94; --warning: 234 179 8; --danger: 239 68 68;
      --muted: 241 245 249; --muted-fg: 100 116 139; --border: 226 232 240; --radius: 0.5rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: rgb(var(--bg)); font-family: "PingFang SC","Noto Sans SC",system-ui,sans-serif; color: rgb(var(--fg)); min-height: 100vh; padding: 32px; line-height: 1.5; }
    .container { max-width: 1600px; margin: 0 auto; }
    .hidden { display: none !important; }
    /* Auth */
    .auth-overlay { position: fixed; inset: 0; background: rgb(var(--bg)); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .auth-box { background: rgb(var(--card)); border: 1px solid rgb(var(--border)); border-radius: var(--radius); padding: 40px; width: 360px; text-align: center; box-shadow: 0 4px 24px rgb(0 0 0/0.1); }
    .auth-box h2 { margin-bottom: 20px; font-size: 1.25rem; }
    .auth-box input { width: 100%; padding: 12px 16px; border: 1px solid rgb(var(--border)); border-radius: var(--radius); font-size: 1rem; margin-bottom: 12px; }
    .auth-box button { width: 100%; padding: 12px; background: rgb(var(--primary)); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; cursor: pointer; font-weight: 600; }
    .auth-box .error { color: rgb(var(--danger)); font-size: 0.85rem; margin-top: 8px; }
    /* Layout */
    .header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: rgb(var(--muted-fg)); font-size: 0.85rem; margin-top: 4px; }
    .refresh-info { text-align: right; color: rgb(var(--muted-fg)); font-size: 0.8rem; }
    .refresh-info .time { font-weight: 600; color: rgb(var(--card-fg)); }
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: rgb(var(--card)); border: 1px solid rgb(var(--border)); border-radius: var(--radius); padding: 18px; box-shadow: 0 1px 3px rgb(0 0 0/0.06); }
    .stat-label { color: rgb(var(--muted-fg)); font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: rgb(var(--card-fg)); margin-top: 4px; }
    .stat-value.alive { color: rgb(var(--success)); }
    .stat-value.dead { color: rgb(var(--danger)); }
    .stat-value.primary { color: rgb(var(--primary)); }
    .stat-sub { color: rgb(var(--muted-fg)); font-size: 0.75rem; margin-top: 4px; }
    .progress-bar { margin-top: 8px; height: 4px; background: rgb(var(--muted)); border-radius: 2px; overflow: hidden; }
    .progress-bar .fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    /* Charts */
    .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
    .chart-card { background: rgb(var(--card)); border: 1px solid rgb(var(--border)); border-radius: var(--radius); padding: 24px; box-shadow: 0 1px 3px rgb(0 0 0/0.06); }
    .chart-card.full { grid-column: span 2; }
    .chart-title { font-size: 0.9rem; font-weight: 600; color: rgb(var(--card-fg)); margin-bottom: 12px; }
    .chart-container { width: 100%; height: 300px; }
    .chart-container.tall { height: 400px; }
    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th { background: rgb(var(--muted)); padding: 8px 12px; text-align: left; font-weight: 600; color: rgb(var(--muted-fg)); font-size: 0.7rem; text-transform: uppercase; }
    .data-table td { padding: 8px 12px; border-bottom: 1px solid rgb(var(--border)); }
    .data-table tr:hover td { background: rgb(var(--muted)); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: rgb(var(--success)/0.1); color: rgb(var(--success)); }
    .badge-fail { background: rgb(var(--danger)/0.1); color: rgb(var(--danger)); }
    .badge-mr { background: #dbeafe; color: #1d4ed8; }
    .badge-mc { background: #dcfce7; color: #166534; }
    .badge-dt { background: #fef3c7; color: #92400e; }
    /* Logs */
    .log-card { background: rgb(var(--card)); border: 1px solid rgb(var(--border)); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
    .log-list { font-family: "JetBrains Mono","Fira Code",monospace; font-size: 0.72rem; line-height: 1.8; max-height: 400px; overflow-y: auto; color: rgb(var(--muted-fg)); }
    .log-list .line { padding: 2px 0; border-bottom: 1px solid rgb(var(--muted)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { padding: 6px 14px; border: 1px solid rgb(var(--border)); border-radius: var(--radius); background: rgb(var(--card)); cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .tab-btn.active { background: rgb(var(--primary)); color: #fff; border-color: rgb(var(--primary)); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } .charts-grid { grid-template-columns: 1fr; } .chart-card.full { grid-column: span 1; } }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } body { padding: 16px; } }
  </style>
</head>
<body>
<!-- AUTH -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>IncognitoGo Dashboard</h2>
    <input type="password" id="pwdInput" placeholder="输入密码" autocomplete="off">
    <button onclick="checkAuth()">进入</button>
    <div class="error hidden" id="authError">密码错误</div>
  </div>
</div>
<!-- MAIN -->
<div class="container hidden" id="mainContent">
  <div class="header">
    <div>
      <div class="page-title">IncognitoGo 阶梯测试</div>
      <div class="subtitle">HK-13 — R4-R5 全量行为执行面板</div>
    </div>
    <div class="refresh-info">
      <div>最后更新: <span class="time" id="lastUpdate">--</span></div>
      <div id="processTag"></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">当前阶段</div>
      <div class="stat-value primary" id="phase">--</div>
      <div class="progress-bar"><div class="fill" id="phaseProgress" style="width:0%;background:rgb(var(--primary))"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">品牌注册</div>
      <div class="stat-value" id="regTotal">--</div>
      <div class="stat-sub" id="regDetail"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">匿名访问</div>
      <div class="stat-value" id="visitCount">--</div>
      <div class="stat-sub" id="visitSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">首次使用</div>
      <div class="stat-value" id="firstUseCount">--</div>
      <div class="stat-sub" id="firstUseSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">回访</div>
      <div class="stat-value" id="returnCount">--</div>
      <div class="stat-sub" id="returnSub"></div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="overview">总览</button>
    <button class="tab-btn" data-tab="accounts">账号明细</button>
    <button class="tab-btn" data-tab="activities">行为记录</button>
    <button class="tab-btn" data-tab="conversations">AI 对话</button>
    <button class="tab-btn" data-tab="logs">运行日志</button>
  </div>

  <!-- Tab: Overview -->
  <div class="tab-panel active" id="tab-overview">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">品牌注册 vs 目标 (累计)</div>
        <div class="chart-container" id="chartReg"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">行为类型分布</div>
        <div class="chart-container" id="chartActions"></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">执行时间线 (按心跳周期)</div>
        <div class="chart-container tall" id="chartTimeline"></div>
      </div>
    </div>
  </div>

  <!-- Tab: Accounts -->
  <div class="tab-panel" id="tab-accounts">
    <div class="chart-card">
      <div class="chart-title">已注册账号 (<span id="accCount">0</span>)</div>
      <div style="overflow-x:auto">
        <table class="data-table" id="accountTable">
          <thead><tr><th>邮箱</th><th>区域</th><th>品牌</th><th>注册时间</th><th>访问次数</th><th>最近活动</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab: Activities -->
  <div class="tab-panel" id="tab-activities">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">活动时间分布 (按小时)</div>
        <div class="chart-container" id="chartHourly"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">品牌 × 行为类型</div>
        <div class="chart-container" id="chartBrandAction"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">最近行为记录</div>
      <div style="overflow-x:auto">
        <table class="data-table" id="activityTable">
          <thead><tr><th>时间</th><th>品牌</th><th>类型</th><th>账号</th><th>耗时</th><th>状态</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab: Conversations -->
  <div class="tab-panel" id="tab-conversations">
    <div class="chart-card">
      <div class="chart-title">AI 对话审计 (<span id="convCount">0</span> 条)</div>
      <div style="overflow-x:auto">
        <table class="data-table" id="convTable">
          <thead><tr><th>时间</th><th>品牌</th><th>账号</th><th>类型</th><th>Prompt</th><th>IP/区域</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab: Logs -->
  <div class="tab-panel" id="tab-logs">
    <div class="log-card">
      <div class="chart-title">实时日志 (最近 40 行)</div>
      <div class="log-list" id="logList"></div>
    </div>
    <div class="chart-card" style="margin-top:16px">
      <div class="chart-title">注册成功记录</div>
      <div class="log-list" id="regLogList"></div>
    </div>
  </div>
</div>
<script>
const PWD_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // placeholder
const CORRECT_PWD = '520biaomei';
const DATA_URL = 'data/incognitogo.json';
const PHASES = ['registrations', 'first-use', 'visits', 'returns', 'complete'];

// Auth
function checkAuth() {
  const input = document.getElementById('pwdInput').value;
  if (input === CORRECT_PWD) {
    sessionStorage.setItem('ig_auth', '1');
    document.getElementById('authOverlay').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    init();
  } else {
    document.getElementById('authError').classList.remove('hidden');
  }
}
document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });
if (sessionStorage.getItem('ig_auth') === '1') {
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  init();
}

// Tabs
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});

async function loadData() {
  try { const r = await fetch(DATA_URL + '?t=' + Date.now()); return await r.json(); } catch { return null; }
}

function phaseIdx(p) { const i = PHASES.indexOf(p); return i >= 0 ? i : 0; }
function fmtDuration(ms) { if (!ms) return '--'; const s = Math.round(ms/1000); return s > 60 ? `${Math.floor(s/60)}m${s%60}s` : `${s}s`; }
function fmtTime(ts) { if (!ts) return '--'; return new Date(ts).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function brandBadge(b) { const cls = b === 'mulerun' ? 'badge-mr' : b === 'myclaw' ? 'badge-mc' : 'badge-dt'; return `<span class="badge ${cls}">${b}</span>`; }

function renderStats(data) {
  const round = data.status.round || '?';
  const phase = data.status.phase || 'unknown';
  document.getElementById('phase').textContent = `R${round} / ${phase}`;
  document.getElementById('phaseProgress').style.width = ((phaseIdx(phase)+1)/PHASES.length*100) + '%';

  const r = data.registry;
  document.getElementById('regTotal').textContent = (r.mulerun||0)+(r.myclaw||0)+(r.ditai||0);
  document.getElementById('regDetail').textContent = `MR:${r.mulerun} MC:${r.myclaw} DT:${r.ditai}`;

  const c = data.counters || {};
  document.getElementById('visitCount').textContent = c.visitSuccess || 0;
  document.getElementById('visitSub').textContent = '成功率 100%';

  document.getElementById('firstUseCount').textContent = c.firstUseSuccess || 0;
  const fuTotal = (c.firstUseSuccess||0) + (c.firstUseFail||0);
  const fuRate = fuTotal > 0 ? Math.round(c.firstUseSuccess/fuTotal*100) : '--';
  document.getElementById('firstUseSub').textContent = `成功率 ${fuRate}% (${fuTotal}次)`;

  document.getElementById('returnCount').textContent = c.returnSuccess || 0;
  document.getElementById('returnSub').textContent = '回访完成';

  const el = document.getElementById('processTag');
  el.innerHTML = data.processAlive
    ? '<span style="color:rgb(var(--success));font-weight:600">● ALIVE</span>'
    : '<span style="color:rgb(var(--danger));font-weight:600">● DEAD</span>';
  document.getElementById('lastUpdate').textContent = new Date(data.updatedAt).toLocaleString('zh-CN');
}

function renderOverviewCharts(data) {
  // Registration bar
  const regChart = echarts.init(document.getElementById('chartReg'));
  const r = data.registry;
  const tgt = data.targets[String(data.status.round||4)] || {};
  const tgtPer = Math.round((tgt.regs||60)/3);
  regChart.setOption({
    tooltip:{trigger:'axis'}, legend:{data:['当前','R'+data.status.round+'目标'],top:0},
    xAxis:{type:'category',data:['MuleRun','MyClaw','dit.ai']}, yAxis:{type:'value'},
    series:[
      {name:'当前',type:'bar',data:[r.mulerun,r.myclaw,r.ditai],itemStyle:{color:'#3b82f6'},barWidth:'35%'},
      {name:'R'+data.status.round+'目标',type:'bar',data:[tgtPer,tgtPer,tgtPer],itemStyle:{color:'#e2e8f0'},barWidth:'35%'}
    ]
  });

  // Action type pie
  const actChart = echarts.init(document.getElementById('chartActions'));
  const c = data.counters || {};
  actChart.setOption({
    tooltip:{trigger:'item'},
    series:[{type:'pie',radius:['35%','65%'],label:{formatter:'{b}\n{c}'},data:[
      {value:c.visitSuccess||0,name:'匿名访问',itemStyle:{color:'#94a3b8'}},
      {value:c.firstUseSuccess||0,name:'首次使用',itemStyle:{color:'#3b82f6'}},
      {value:c.returnSuccess||0,name:'回访',itemStyle:{color:'#22c55e'}},
      {value:c.firstUseFail||0,name:'登录失败',itemStyle:{color:'#ef4444'}},
    ]}]
  });

  // Timeline — long-range view showing cumulative progress per heartbeat
  const tlChart = echarts.init(document.getElementById('chartTimeline'));
  const tl = data.timeline || [];
  tlChart.setOption({
    tooltip:{trigger:'axis'},
    legend:{data:['匿名访问','首次使用','回访','错误数'],top:0},
    grid:{left:60,right:30,bottom:60},
    xAxis:{type:'category',data:tl.map(t=>fmtTime(t.ts)),axisLabel:{rotate:45,fontSize:10}},
    yAxis:[{type:'value',name:'累计次数'},{type:'value',name:'错误',splitLine:{show:false}}],
    series:[
      {name:'匿名访问',type:'line',data:tl.map(t=>(t.counters&&t.counters.visitSuccess)||0),smooth:true,areaStyle:{opacity:0.1}},
      {name:'首次使用',type:'line',data:tl.map(t=>(t.counters&&t.counters.firstUseSuccess)||0),smooth:true},
      {name:'回访',type:'line',data:tl.map(t=>(t.counters&&t.counters.returnSuccess)||0),smooth:true},
      {name:'错误数',type:'bar',yAxisIndex:1,data:tl.map(t=>t.errors||0),itemStyle:{color:'#fca5a5'}},
    ]
  });

  window.addEventListener('resize',()=>{regChart.resize();actChart.resize();tlChart.resize();});
}

function renderAccounts(data) {
  const accounts = (data.registry.accounts || []).sort((a,b) => (b.visits||[]).length - (a.visits||[]).length);
  document.getElementById('accCount').textContent = accounts.length;
  const tbody = document.querySelector('#accountTable tbody');
  tbody.innerHTML = accounts.map(a => {
    const brands = (a.brands||[]).map(b => brandBadge(b.name)).join(' ');
    const regTime = a.brands && a.brands[0] ? fmtTime(a.brands[0].registeredAt) : '--';
    const visits = (a.visits||[]).length;
    const lastVisit = a.visits && a.visits.length > 0 ? fmtTime(a.visits[a.visits.length-1].ts) : '--';
    return `<tr><td>${a.email}</td><td>${a.region}</td><td>${brands}</td><td>${regTime}</td><td>${visits}</td><td>${lastVisit}</td></tr>`;
  }).join('');
}

function renderActivities(data) {
  const all = [];
  for (const [type, entries] of Object.entries(data.activities || {})) {
    for (const e of entries) all.push({...e, actType: type});
  }
  all.sort((a,b) => new Date(b.ts) - new Date(a.ts));

  // Table
  const tbody = document.querySelector('#activityTable tbody');
  tbody.innerHTML = all.slice(0, 100).map(a => {
    const statusCls = a.success ? 'badge-success' : 'badge-fail';
    const statusTxt = a.success ? 'OK' : 'FAIL';
    const typeMap = {anonymous:'匿名访问',first_use:'首次使用',return:'回访'};
    return `<tr><td>${fmtTime(a.ts)}</td><td>${brandBadge(a.brand)}</td><td>${typeMap[a.actType]||a.actType}</td><td>${a.account||'--'}</td><td>${fmtDuration(a.duration)}</td><td><span class="badge ${statusCls}">${statusTxt}</span></td></tr>`;
  }).join('');

  // Hourly distribution chart
  const hourly = new Array(24).fill(0);
  all.forEach(a => { const h = new Date(a.ts).getHours(); hourly[h]++; });
  const hChart = echarts.init(document.getElementById('chartHourly'));
  hChart.setOption({
    tooltip:{trigger:'axis'}, xAxis:{type:'category',data:hourly.map((_,i)=>i+':00')},
    yAxis:{type:'value'}, series:[{type:'bar',data:hourly,itemStyle:{color:'#3b82f6'}}]
  });

  // Brand × Action stacked bar
  const brandActions = {};
  all.forEach(a => {
    if (!brandActions[a.brand]) brandActions[a.brand] = {anonymous:0,first_use:0,return:0};
    brandActions[a.brand][a.actType] = (brandActions[a.brand][a.actType]||0) + 1;
  });
  const baChart = echarts.init(document.getElementById('chartBrandAction'));
  const brands = Object.keys(brandActions);
  baChart.setOption({
    tooltip:{trigger:'axis'}, legend:{data:['匿名访问','首次使用','回访'],top:0},
    xAxis:{type:'category',data:brands}, yAxis:{type:'value'},
    series:[
      {name:'匿名访问',type:'bar',stack:'a',data:brands.map(b=>brandActions[b].anonymous||0),itemStyle:{color:'#94a3b8'}},
      {name:'首次使用',type:'bar',stack:'a',data:brands.map(b=>brandActions[b].first_use||0),itemStyle:{color:'#3b82f6'}},
      {name:'回访',type:'bar',stack:'a',data:brands.map(b=>brandActions[b].return||0),itemStyle:{color:'#22c55e'}},
    ]
  });
  window.addEventListener('resize',()=>{hChart.resize();baChart.resize();});
}

function renderConversations(data) {
  const convs = data.aiConversations || [];
  document.getElementById('convCount').textContent = convs.length;
  const tbody = document.querySelector('#convTable tbody');
  tbody.innerHTML = convs.slice().reverse().map(c => {
    const prompts = (c.conversations||[]).map(x => x.prompt).join(' → ');
    return `<tr><td>${fmtTime(c.ts)}</td><td>${brandBadge(c.brand)}</td><td>${c.email||'--'}</td><td>${c.type||'--'}</td><td title="${prompts.replace(/"/g,'&quot;')}">${prompts.slice(0,80)}${prompts.length>80?'...':''}</td><td>${c.ip||'?'}/${c.region||'?'}</td></tr>`;
  }).join('');
}

function renderLogs(data) {
  document.getElementById('logList').innerHTML = (data.recentLogs||[]).map(l => `<div class="line">${l.replace(/</g,'&lt;')}</div>`).join('');
  document.getElementById('regLogList').innerHTML = (data.registrationLog||[]).map(l => `<div class="line">${l.replace(/</g,'&lt;')}</div>`).join('');
}

async function init() {
  const data = await loadData();
  if (!data) { document.getElementById('phase').textContent = '数据加载失败'; return; }
  renderStats(data);
  renderOverviewCharts(data);
  renderAccounts(data);
  renderActivities(data);
  renderConversations(data);
  renderLogs(data);
}

setInterval(async()=>{ if(sessionStorage.getItem('ig_auth')==='1') init(); }, 300000);
</script>
</body>
</html>
